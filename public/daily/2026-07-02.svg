<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Multilingual travel support apology with next step</title>
  <desc id="desc">An overhead support desk shows guest messages, hotel confirmation, a headset, passport, key card, next-step note, phone, clock, and an alternate-room arrow.</desc>
  <defs>
    <linearGradient id="desk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f2eee2"/>
      <stop offset="0.52" stop-color="#d7e7df"/>
      <stop offset="1" stop-color="#9dbec0"/>
    </linearGradient>
    <linearGradient id="paperWarm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff8e7"/>
      <stop offset="1" stop-color="#ead7ab"/>
    </linearGradient>
    <linearGradient id="paperCool" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef8ff"/>
      <stop offset="1" stop-color="#bdd7e4"/>
    </linearGradient>
    <linearGradient id="phoneGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2c4a59"/>
      <stop offset="1" stop-color="#142a34"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#3c5054" flood-opacity=".22"/>
    </filter>
  </defs>

  <rect width="960" height="540" rx="28" fill="url(#desk)"/>
  <path d="M80 92h800M110 132h728M96 444h760" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity=".44"/>
  <path d="M100 388c122-32 242-34 360-4 108 28 242 25 398-10" fill="none" stroke="#f7fbf7" stroke-width="9" stroke-linecap="round" opacity=".42"/>

  <g transform="translate(90 136)" filter="url(#shadow)">
    <rect width="244" height="186" rx="26" fill="url(#paperWarm)"/>
    <rect x="28" y="28" width="76" height="30" rx="15" fill="#d85d55"/>
    <path d="M30 82h156M30 114h118M30 146h164" stroke="#5e665e" stroke-width="9" stroke-linecap="round"/>
    <path d="M190 54c20 20 20 50 0 70M214 34c38 38 38 90 0 128" fill="none" stroke="#e1a34e" stroke-width="8" stroke-linecap="round"/>
    <text x="26" y="222" fill="#526260" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">guest message</text>
  </g>

  <g transform="translate(626 128)" filter="url(#shadow)">
    <rect width="238" height="194" rx="26" fill="url(#paperCool)"/>
    <rect x="30" y="28" width="92" height="30" rx="15" fill="#4d9a9b"/>
    <path d="M32 84h148M32 118h118M32 152h168" stroke="#4c6670" stroke-width="9" stroke-linecap="round"/>
    <circle cx="184" cy="48" r="13" fill="#f0bf57"/>
    <path d="M176 122l36 26-48 8" fill="none" stroke="#d85d55" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="24" y="230" fill="#526260" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">hotel confirmation</text>
  </g>

  <g transform="translate(356 122)" filter="url(#shadow)">
    <rect width="252" height="256" rx="30" fill="#fffdf3"/>
    <rect x="34" y="34" width="184" height="44" rx="18" fill="#263f4a"/>
    <path d="M58 56h68M150 56h44" stroke="#f8eac2" stroke-width="8" stroke-linecap="round"/>
    <path d="M38 112h176M38 152h140M38 192h168" stroke="#596d68" stroke-width="9" stroke-linecap="round"/>
    <rect x="42" y="214" width="156" height="24" rx="12" fill="#f1c75e"/>
    <path d="M76 226h82" stroke="#6b5834" stroke-width="7" stroke-linecap="round"/>
    <text x="36" y="296" fill="#526260" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">next step note</text>
  </g>

  <g transform="translate(134 354)" filter="url(#shadow)">
    <rect width="138" height="92" rx="22" fill="#263f4a"/>
    <circle cx="30" cy="30" r="13" fill="#f1c75e"/>
    <path d="M30 52h78M30 72h56" stroke="#eaf5ef" stroke-width="8" stroke-linecap="round"/>
    <text x="0" y="128" fill="#536461" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">passport</text>
  </g>

  <g transform="translate(286 376)" filter="url(#shadow)">
    <rect width="126" height="72" rx="20" fill="#f7efe0"/>
    <rect x="24" y="20" width="38" height="24" rx="8" fill="#d85d55"/>
    <rect x="74" y="20" width="28" height="24" rx="8" fill="#4d9a9b"/>
    <path d="M26 56h76" stroke="#6a6254" stroke-width="8" stroke-linecap="round"/>
    <text x="-4" y="108" fill="#536461" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">key card</text>
  </g>

  <g transform="translate(520 386)" filter="url(#shadow)">
    <rect width="146" height="78" rx="22" fill="url(#phoneGlow)"/>
    <circle cx="36" cy="38" r="17" fill="#78d0ba"/>
    <path d="M72 28h46M72 50h34" stroke="#e8f5ef" stroke-width="8" stroke-linecap="round"/>
    <path d="M36 38c22-42 70-54 116-32" fill="none" stroke="#f1c75e" stroke-width="8" stroke-linecap="round" stroke-dasharray="10 14"/>
    <text x="-10" y="114" fill="#536461" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">support call</text>
  </g>

  <g transform="translate(704 360)" filter="url(#shadow)">
    <circle cx="58" cy="58" r="58" fill="#fff8e7"/>
    <path d="M58 22v36l30 18" stroke="#5f6960" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="58" cy="58" r="7" fill="#d85d55"/>
    <text x="14" y="144" fill="#536461" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">still waiting</text>
  </g>

  <g transform="translate(402 54)" filter="url(#shadow)">
    <path d="M0 0h150c18 0 32 14 32 32v28H0z" fill="#2f5961"/>
    <path d="M26 31h74M128 18l22 16-28 12" fill="none" stroke="#f1c75e" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="-4" y="96" fill="#526260" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">alternate room</text>
  </g>

  <g transform="translate(104 78)">
    <path d="M0 0c20-44 90-44 110 0" fill="none" stroke="#314c56" stroke-width="13" stroke-linecap="round"/>
    <path d="M12 0v56M98 0v56" stroke="#314c56" stroke-width="15" stroke-linecap="round"/>
    <rect x="92" y="42" width="58" height="18" rx="9" fill="#314c56"/>
    <circle cx="154" cy="51" r="9" fill="#f1c75e"/>
  </g>

  <path d="M336 226c42-22 84-24 126-6M608 228c44 20 78 20 112 0M452 378c30 20 66 24 108 16" fill="none" stroke="#f1c75e" stroke-width="8" stroke-linecap="round" stroke-dasharray="12 16" opacity=".9"/>
  <path d="M720 228l34 13-28 24" fill="none" stroke="#f1c75e" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="78" y="64" fill="#38545a" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">apology with a next step</text>
  <text x="78" y="98" fill="#627876" font-family="Inter, Arial, sans-serif" font-size="16">language, fact, courtesy, owner, action</text>
</svg>
