<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Island hotel storm recovery after canceled ferries</title>
  <desc id="desc">An island hotel lobby and pier recovery scene shows a canceled ferry board, front-desk whiteboard, wet umbrellas, luggage-hold tag, transfer van keys, room-extension cards, hot tea tray, weather radar, pier timeline, and an arrow toward the airport.</desc>
  <defs>
    <linearGradient id="stormGlass" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#dbe7df"/>
      <stop offset="0.42" stop-color="#8fb0b4"/>
      <stop offset="1" stop-color="#2f4b58"/>
    </linearGradient>
    <linearGradient id="lobbyFloor" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#7e6b59"/>
      <stop offset="0.5" stop-color="#d0b27c"/>
      <stop offset="1" stop-color="#536a6b"/>
    </linearGradient>
    <linearGradient id="whiteboard" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff9e8"/>
      <stop offset="1" stop-color="#d9e7df"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#193241"/>
      <stop offset="1" stop-color="#081923"/>
    </linearGradient>
    <linearGradient id="tea" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffe19b"/>
      <stop offset="1" stop-color="#c86e4f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#22343c" flood-opacity=".24"/>
    </filter>
    <filter id="rainBlur" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>

  <rect width="960" height="540" rx="28" fill="url(#stormGlass)"/>
  <path d="M76 74h808M108 116h720M82 450h796" stroke="#f8f0da" stroke-width="8" stroke-linecap="round" opacity=".36"/>
  <path d="M92 388c86-42 178-48 276-18 104 32 214 20 330-34 62-30 112-34 154-14" fill="none" stroke="#f8f0da" stroke-width="10" stroke-linecap="round" opacity=".22"/>
  <rect x="72" y="344" width="816" height="112" rx="30" fill="url(#lobbyFloor)" opacity=".86"/>

  <g opacity=".55" filter="url(#rainBlur)">
    <path d="M102 74l-34 122M178 62l-42 160M272 52l-36 132M738 58l-46 174M822 74l-38 142M884 92l-32 110" stroke="#e9f8f4" stroke-width="5" stroke-linecap="round"/>
    <path d="M622 78l-42 142M522 50l-36 130M424 72l-40 158" stroke="#b7d3d2" stroke-width="5" stroke-linecap="round"/>
  </g>

  <g transform="translate(78 86)" filter="url(#shadow)">
    <rect width="242" height="176" rx="26" fill="url(#screen)"/>
    <rect x="26" y="28" width="190" height="44" rx="16" fill="#d84f4c"/>
    <path d="M50 50h126" stroke="#fff5dc" stroke-width="9" stroke-linecap="round"/>
    <path d="M34 104h88M34 132h142" stroke="#a8c5c3" stroke-width="8" stroke-linecap="round"/>
    <path d="M166 108l32 24-42 10" fill="none" stroke="#ffc45f" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="34" y="212" fill="#eaf4ef" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">ferry board flips to canceled</text>
  </g>

  <g transform="translate(350 70)" filter="url(#shadow)">
    <rect width="246" height="292" rx="30" fill="url(#whiteboard)"/>
    <rect x="24" y="26" width="106" height="42" rx="16" fill="#2f5962"/>
    <path d="M48 48h56" stroke="#ffe19b" stroke-width="8" stroke-linecap="round"/>
    <path d="M32 98h150M32 132h112M32 166h168M32 200h128" stroke="#60756e" stroke-width="8" stroke-linecap="round"/>
    <circle cx="198" cy="100" r="12" fill="#d84f4c"/>
    <circle cx="170" cy="134" r="11" fill="#3e978d"/>
    <circle cx="214" cy="198" r="11" fill="#ffc45f"/>
    <path d="M42 238h152" stroke="#2f5962" stroke-width="9" stroke-linecap="round"/>
    <path d="M176 222l30 18-34 12" fill="none" stroke="#d84f4c" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="24" y="330" fill="#324d50" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">lobby timeline before rumors</text>
  </g>

  <g transform="translate(636 76)" filter="url(#shadow)">
    <rect width="210" height="158" rx="28" fill="#e8f0e7"/>
    <circle cx="82" cy="74" r="48" fill="#2f5962"/>
    <path d="M82 26v96M34 74h96" stroke="#87b6b3" stroke-width="7" stroke-linecap="round" opacity=".75"/>
    <path d="M54 42c28 34 66 32 92-2M46 104c34-26 72-24 110 6" fill="none" stroke="#ffc45f" stroke-width="8" stroke-linecap="round"/>
    <path d="M148 42h34M148 70h24M148 98h42" stroke="#5d716d" stroke-width="8" stroke-linecap="round"/>
    <text x="4" y="198" fill="#eaf4ef" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">weather radar keeps moving</text>
  </g>

  <g transform="translate(110 300)" filter="url(#shadow)">
    <path d="M22 72c22-66 102-66 124 0z" fill="#ffc45f"/>
    <path d="M84 72v72" stroke="#364c4f" stroke-width="10" stroke-linecap="round"/>
    <path d="M48 144h72" stroke="#364c4f" stroke-width="10" stroke-linecap="round"/>
    <path d="M158 68c20-46 78-46 98 0z" fill="#3e978d"/>
    <path d="M208 68v78" stroke="#364c4f" stroke-width="10" stroke-linecap="round"/>
    <circle cx="54" cy="164" r="7" fill="#cfe2dc"/>
    <circle cx="132" cy="156" r="6" fill="#cfe2dc"/>
    <circle cx="198" cy="158" r="7" fill="#cfe2dc"/>
    <text x="-2" y="206" fill="#eaf4ef" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">umbrellas drip by the door</text>
  </g>

  <g transform="translate(266 354)" filter="url(#shadow)">
    <rect width="148" height="84" rx="24" fill="#fff4d6"/>
    <path d="M28 28h72M28 52h96" stroke="#6a6252" stroke-width="8" stroke-linecap="round"/>
    <circle cx="116" cy="28" r="11" fill="#d84f4c"/>
    <path d="M132 62c22 14 34 30 36 50" fill="none" stroke="#2f5962" stroke-width="8" stroke-linecap="round"/>
    <text x="-10" y="122" fill="#eaf4ef" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">luggage hold tag</text>
  </g>

  <g transform="translate(620 262)" filter="url(#shadow)">
    <rect width="210" height="116" rx="26" fill="#233c47"/>
    <rect x="22" y="24" width="76" height="52" rx="16" fill="#f5ead0"/>
    <path d="M42 46h36M42 64h52" stroke="#233c47" stroke-width="7" stroke-linecap="round"/>
    <path d="M130 24v56M112 42h40" stroke="#ffc45f" stroke-width="9" stroke-linecap="round"/>
    <circle cx="154" cy="82" r="16" fill="#d84f4c"/>
    <path d="M168 80c30 2 46 20 48 52" fill="none" stroke="#ffc45f" stroke-width="8" stroke-linecap="round"/>
    <text x="-2" y="154" fill="#eaf4ef" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">van keys wait for a new order</text>
  </g>

  <g transform="translate(700 386)" filter="url(#shadow)">
    <rect width="150" height="70" rx="24" fill="#fff8e5"/>
    <path d="M24 28h76M24 48h102" stroke="#665d4f" stroke-width="8" stroke-linecap="round"/>
    <circle cx="122" cy="28" r="11" fill="#3e978d"/>
    <text x="-8" y="108" fill="#eaf4ef" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">room extension cards</text>
  </g>

  <g transform="translate(458 384)" filter="url(#shadow)">
    <rect width="116" height="54" rx="20" fill="#d9e7df"/>
    <circle cx="32" cy="22" r="18" fill="url(#tea)"/>
    <circle cx="72" cy="22" r="18" fill="url(#tea)"/>
    <path d="M24 18c10 8 20 8 30 0M64 18c10 8 20 8 30 0" fill="none" stroke="#fff4d6" stroke-width="5" stroke-linecap="round"/>
    <path d="M104 20c28-4 44 10 48 36" fill="none" stroke="#d9e7df" stroke-width="8" stroke-linecap="round"/>
    <text x="-8" y="92" fill="#eaf4ef" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">hot tea buys patience</text>
  </g>

  <g transform="translate(180 238)">
    <path d="M0 0h584" stroke="#ffe19b" stroke-width="8" stroke-linecap="round" stroke-dasharray="14 18" opacity=".9"/>
    <circle cx="0" cy="0" r="12" fill="#d84f4c"/>
    <circle cx="198" cy="0" r="12" fill="#ffc45f"/>
    <circle cx="394" cy="0" r="12" fill="#3e978d"/>
    <path d="M584 0l-32-20 10 36" fill="none" stroke="#ffe19b" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="462" y="-22" fill="#fff4d6" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">airport first</text>
  </g>

  <text x="76" y="64" fill="#263f48" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">when ferries stop, the hotel reorders time</text>
  <text x="76" y="98" fill="#50696d" font-family="Inter, Arial, sans-serif" font-size="16">rooms, vans, dinner, luggage, policy, airport, patience</text>
</svg>
