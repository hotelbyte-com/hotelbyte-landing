<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Supplier evidence folder narrowing one rate dispute</title>
  <desc id="desc">An editorial supplier evidence folder shows a highlighted contract page, email screenshot, rate-sheet version, currency tag, disputed row, redacted sensitive fields, confirmation stamp, rule index card, and connector lines leading to one rate mismatch.</desc>
  <defs>
    <linearGradient id="table" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#edf2e9"/>
      <stop offset="0.48" stop-color="#c7d5c7"/>
      <stop offset="1" stop-color="#52676d"/>
    </linearGradient>
    <linearGradient id="folder" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffe9a9"/>
      <stop offset="1" stop-color="#c88b55"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fffaf0"/>
      <stop offset="1" stop-color="#dfd8c3"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#203846"/>
      <stop offset="1" stop-color="#0d1c26"/>
    </linearGradient>
    <linearGradient id="rateSheet" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#e8f6f0"/>
      <stop offset="1" stop-color="#91b6aa"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#2f4144" flood-opacity=".24"/>
    </filter>
  </defs>

  <rect width="960" height="540" rx="28" fill="url(#table)"/>
  <path d="M76 74h808M110 116h710M86 454h788" stroke="#fff8e7" stroke-width="8" stroke-linecap="round" opacity=".42"/>
  <path d="M100 388c112-34 222-34 330 0 122 38 254 24 394-42" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round" opacity=".24"/>
  <rect x="80" y="348" width="802" height="106" rx="30" fill="#705c4d" opacity=".14"/>

  <g transform="translate(96 112)" filter="url(#shadow)">
    <path d="M0 54h202l34 38h284c28 0 50 22 50 50v218H0z" fill="url(#folder)"/>
    <path d="M0 128h570v232H0z" fill="#d19a5d"/>
    <path d="M34 174h456M34 216h420M34 258h456M34 300h368" stroke="#fff0c9" stroke-width="9" stroke-linecap="round" opacity=".5"/>
    <text x="30" y="400" fill="#fff7df" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">supplier evidence folder</text>
  </g>

  <g transform="translate(142 74) rotate(-4)" filter="url(#shadow)">
    <rect width="218" height="278" rx="26" fill="url(#paper)"/>
    <rect x="26" y="24" width="108" height="34" rx="14" fill="#263f4a"/>
    <path d="M50 42h60" stroke="#ffe46d" stroke-width="8" stroke-linecap="round"/>
    <path d="M28 90h146M28 122h120M28 154h152M28 218h134" stroke="#6c7068" stroke-width="8" stroke-linecap="round"/>
    <rect x="24" y="174" width="166" height="28" rx="10" fill="#ffe46d" opacity=".8"/>
    <path d="M44 188h108" stroke="#6c5a2d" stroke-width="7" stroke-linecap="round"/>
    <circle cx="172" cy="236" r="18" fill="#d95f54"/>
    <path d="M158 236h28" stroke="#fff8e7" stroke-width="6" stroke-linecap="round"/>
    <text x="22" y="318" fill="#465b5d" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">contract page 14</text>
  </g>

  <g transform="translate(400 68) rotate(3)" filter="url(#shadow)">
    <rect width="230" height="164" rx="26" fill="url(#screen)"/>
    <rect x="22" y="22" width="72" height="26" rx="12" fill="#81b6a8"/>
    <path d="M26 76h126M26 104h168M26 132h106" stroke="#d8eee7" stroke-width="8" stroke-linecap="round" opacity=".82"/>
    <rect x="142" y="20" width="58" height="34" rx="14" fill="#e6c44f"/>
    <path d="M156 38h30" stroke="#203846" stroke-width="7" stroke-linecap="round"/>
    <text x="16" y="204" fill="#465b5d" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">email confirmation screenshot</text>
  </g>

  <g transform="translate(616 160)" filter="url(#shadow)">
    <rect width="244" height="194" rx="28" fill="url(#rateSheet)"/>
    <path d="M28 52h184M28 92h184M28 132h184" stroke="#edf8f4" stroke-width="6" stroke-linecap="round" opacity=".86"/>
    <path d="M78 28v128M140 28v128" stroke="#edf8f4" stroke-width="6" stroke-linecap="round" opacity=".72"/>
    <rect x="24" y="84" width="196" height="32" rx="10" fill="#d95f54" opacity=".84"/>
    <path d="M38 100h42M94 100h28M154 100h44" stroke="#fff8e7" stroke-width="7" stroke-linecap="round"/>
    <rect x="150" y="24" width="64" height="34" rx="14" fill="#263f4a"/>
    <path d="M164 42h36" stroke="#ffe46d" stroke-width="7" stroke-linecap="round"/>
    <text x="2" y="234" fill="#edf7f1" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">rate sheet v3, disputed row</text>
  </g>

  <g transform="translate(408 284)" filter="url(#shadow)">
    <rect width="168" height="114" rx="24" fill="#fffaf0"/>
    <path d="M26 34h72M26 62h116M26 88h80" stroke="#686c63" stroke-width="8" stroke-linecap="round"/>
    <rect x="104" y="20" width="42" height="28" rx="12" fill="#263f4a"/>
    <text x="112" y="40" fill="#ffe46d" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800">AED</text>
    <text x="-4" y="152" fill="#edf7f1" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">currency tag fixes scope</text>
  </g>

  <g transform="translate(672 70)" filter="url(#shadow)">
    <rect width="148" height="86" rx="22" fill="#fffaf0"/>
    <path d="M24 30h84M24 56h54" stroke="#6f7168" stroke-width="8" stroke-linecap="round"/>
    <path d="M102 52c30 12 48 30 54 54" fill="none" stroke="#d95f54" stroke-width="8" stroke-linecap="round"/>
    <text x="-2" y="124" fill="#465b5d" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">rule index card</text>
  </g>

  <g transform="translate(202 366)" filter="url(#shadow)">
    <rect width="158" height="72" rx="22" fill="#263f4a"/>
    <path d="M24 24h96M24 48h64" stroke="#d8eee7" stroke-width="8" stroke-linecap="round"/>
    <rect x="108" y="18" width="30" height="20" rx="8" fill="#d8eee7"/>
    <path d="M112 28h22" stroke="#263f4a" stroke-width="5" stroke-linecap="round"/>
    <text x="-10" y="110" fill="#edf7f1" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">redacted fields stay put</text>
  </g>

  <g transform="translate(540 396)" filter="url(#shadow)">
    <circle cx="46" cy="46" r="42" fill="#d95f54"/>
    <circle cx="46" cy="46" r="28" fill="#fff8e7"/>
    <path d="M30 48h32M46 32v32" stroke="#d95f54" stroke-width="8" stroke-linecap="round"/>
    <path d="M82 44c34 0 34 34 0 34" fill="none" stroke="#fff8e7" stroke-width="10" stroke-linecap="round"/>
    <text x="-10" y="110" fill="#edf7f1" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">confirmed source</text>
  </g>

  <path d="M334 208c76 12 128 44 156 96M582 302c32-58 78-86 138-84M546 118c56-10 96-2 120 24M360 392c66 0 124 18 174 54" fill="none" stroke="#ffe46d" stroke-width="8" stroke-linecap="round" stroke-dasharray="12 16" opacity=".9"/>
  <path d="M720 218l-30-12 8 30M490 304l-26-20 2 32M534 446l-30-8 12 28" fill="none" stroke="#ffe46d" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity=".9"/>

  <text x="76" y="64" fill="#314b50" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">one dispute, fewer loose documents</text>
  <text x="76" y="98" fill="#617273" font-family="Inter, Arial, sans-serif" font-size="16">contract, email, version, currency, redaction, row, rule, confirmation</text>
</svg>
