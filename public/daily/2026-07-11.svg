    <path d="M42 42h58M114 42h22" stroke="#263343" stroke-width="7" stroke-linecap="round"/>
    <circle cx="34" cy="42" r="8" fill="#d9574e"/>
    <text x="2" y="124" fill="#f4ead7" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">room account</text>
  </g>

  <g transform="translate(620 70)" filter="url(#shadow)">
    <rect width="128" height="130" rx="28" fill="#f6d57e"/>
    <circle cx="64" cy="64" r="42" fill="#fff7df"/>
    <path d="M64 64V38M64 64h30" stroke="#2f3b46" stroke-width="8" stroke-linecap="round"/>
    <circle cx="64" cy="64" r="5" fill="#2f3b46"/>
    <text x="22" y="118" fill="#2f3b46" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">9:50</text>
  </g>

  <g transform="translate(224 104)" filter="url(#shadow)">
    <rect width="166" height="82" rx="24" fill="#f7efe0"/>
    <path d="M24 30h70M24 54h112" stroke="#6a5948" stroke-width="8" stroke-linecap="round"/>
    <circle cx="126" cy="30" r="11" fill="#4a8f80"/>
    <text x="-2" y="120" fill="#e9f1eb" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">front desk call</text>
  </g>

  <g transform="translate(520 342)" filter="url(#shadow)">
    <rect width="126" height="82" rx="22" fill="#fff8e8"/>
    <path d="M32 18v46" stroke="#6c5942" stroke-width="8" stroke-linecap="round"/>
    <path d="M54 18v46M76 18v46M98 18v46" stroke="#6c5942" stroke-width="5" stroke-linecap="round"/>
    <rect x="20" y="58" width="86" height="14" rx="7" fill="#d9574e"/>
    <text x="-10" y="120" fill="#fff1d1" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">fork + napkin</text>
  </g>

  <g transform="translate(128 88)">
    <rect x="0" y="0" width="156" height="54" rx="18" fill="#f6d57e"/>
    <path d="M24 20h72M24 36h104" stroke="#6f4d2f" stroke-width="7" stroke-linecap="round"/>
    <text x="12" y="-16" fill="#fff5d8" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">kitchen pass</text>
  </g>

  <path d="M256 342c56-24 100-30 150-18M612 286c44-34 82-52 124-54M628 404c-50-22-92-44-126-68M318 238c-36-30-72-44-110-42" fill="none" stroke="#f6d57e" stroke-width="8" stroke-linecap="round" stroke-dasharray="12 16" opacity=".86"/>
  <path d="M734 232l32-2-18 26" fill="none" stroke="#f6d57e" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity=".86"/>

  <text x="78" y="66" fill="#fff3d8" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">the boxed meal has to travel too</text>
  <text x="78" y="100" fill="#f6d9a6" font-family="Inter, Arial, sans-serif" font-size="16">closing time, kitchen, front desk, driver, account, allergy, next leg</text>
</svg>
