<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">One airport transfer route with three language notes</title>
  <desc id="desc">An editorial airport transfer scene showing trilingual route cards, a driver phone, a hotel sticky note, terminal gate, short-term parking, luggage trolley, night closure, support headset, and colored paths converging on one meeting point.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#dfeef4"/>
      <stop offset="0.48" stop-color="#f3ead8"/>
      <stop offset="1" stop-color="#6f7d89"/>
    </linearGradient>
    <linearGradient id="terminal" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fdf8e9"/>
      <stop offset="1" stop-color="#c6d3cf"/>
    </linearGradient>
    <linearGradient id="road" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#4f5c64"/>
      <stop offset="1" stop-color="#202c35"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fffaf0"/>
      <stop offset="1" stop-color="#e7dcc0"/>
    </linearGradient>
    <linearGradient id="phone" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#263944"/>
      <stop offset="1" stop-color="#101820"/>
    </linearGradient>
    <linearGradient id="marker" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffcb65"/>
      <stop offset="1" stop-color="#e16a4f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#26333a" flood-opacity=".24"/>
    </filter>
  </defs>

  <rect width="960" height="540" rx="28" fill="url(#sky)"/>
  <circle cx="816" cy="82" r="60" fill="#f5c765" opacity=".55"/>
  <path d="M82 78h790M112 118h704M82 462h800" stroke="#fff8e7" stroke-width="8" stroke-linecap="round" opacity=".44"/>
  <path d="M96 388c120-30 246-30 378 0 128 29 252 20 382-28" fill="none" stroke="#ffffff" stroke-width="9" stroke-linecap="round" opacity=".26"/>

  <g transform="translate(74 142)" filter="url(#shadow)">
    <path d="M0 136 470 18l332 126-470 146z" fill="url(#road)"/>
    <path d="M46 142 470 40l284 104-424 126z" fill="#687780" opacity=".42"/>
    <path d="M124 162c100-42 214-70 344-88M326 256c84-46 178-76 282-92" fill="none" stroke="#f6dd8a" stroke-width="8" stroke-linecap="round" stroke-dasharray="24 22" opacity=".82"/>
    <path d="M518 62 752 148" stroke="#e9f1ec" stroke-width="7" stroke-linecap="round" opacity=".42"/>
  </g>

  <g transform="translate(104 124)" filter="url(#shadow)">
    <path d="M0 70 224 12l196 72-224 70z" fill="#d6c49b"/>
    <path d="M0 70v184l196 86V154z" fill="#baa277"/>
    <path d="M196 154 420 84v174l-224 82z" fill="url(#terminal)"/>
    <path d="M42 112h96M42 150h96M42 188h96" stroke="#fff4d5" stroke-width="10" stroke-linecap="round"/>
    <path d="M242 134h62M242 172h62M334 112h42M334 150h42M334 188h42" stroke="#83a9a8" stroke-width="10" stroke-linecap="round"/>
    <rect x="238" y="220" width="86" height="72" rx="16" fill="#2a4350"/>
    <text x="256" y="266" fill="#ffe091" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="900">3</text>
    <text x="214" y="334" fill="#445759" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">terminal gate</text>
  </g>

  <g transform="translate(566 92)" filter="url(#shadow)">
    <rect width="244" height="318" rx="30" fill="url(#card)"/>
    <rect x="30" y="28" width="184" height="42" rx="16" fill="#2c4651"/>
    <path d="M52 50h70M142 50h44" stroke="#ffdc7a" stroke-width="8" stroke-linecap="round"/>
    <text x="36" y="112" fill="#425758" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">Gate 3</text>
    <path d="M38 142h156M38 170h122" stroke="#66756e" stroke-width="8" stroke-linecap="round"/>
    <rect x="36" y="202" width="72" height="34" rx="14" fill="#4c9b98"/>
    <rect x="122" y="202" width="68" height="34" rx="14" fill="#e36d57"/>
    <path d="M52 220h38M138 220h32" stroke="#fff8e7" stroke-width="7" stroke-linecap="round"/>
    <circle cx="194" cy="102" r="14" fill="#e36d57"/>
    <text x="34" y="286" fill="#465958" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">one owned route card</text>
  </g>

  <g transform="translate(338 60)" filter="url(#shadow)">
    <rect width="168" height="248" rx="28" fill="url(#phone)"/>
    <rect x="18" y="24" width="132" height="180" rx="20" fill="#e8f4ef"/>
    <path d="M42 66h68M42 94h86M42 122h52" stroke="#526a67" stroke-width="8" stroke-linecap="round"/>
    <path d="M54 154c32-28 64-32 96-12" fill="none" stroke="#e36d57" stroke-width="8" stroke-linecap="round"/>
    <circle cx="124" cy="142" r="11" fill="#ffcb65"/>
    <circle cx="84" cy="220" r="8" fill="#f7ead1"/>
    <text x="10" y="286" fill="#41545b" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">driver phone</text>
  </g>

  <g transform="translate(186 336)" filter="url(#shadow)">
    <rect width="196" height="92" rx="24" fill="#fff4ce"/>
    <path d="M28 34h72M28 60h112" stroke="#6b5a42" stroke-width="8" stroke-linecap="round"/>
    <circle cx="154" cy="36" r="12" fill="#4c9b98"/>
    <text x="8" y="130" fill="#f7ead1" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">hotel fallback note</text>
  </g>

  <g transform="translate(682 356)" filter="url(#shadow)">
    <rect width="176" height="82" rx="22" fill="#f7ead1"/>
    <path d="M26 30h70M26 54h112" stroke="#695949" stroke-width="8" stroke-linecap="round"/>
    <rect x="118" y="18" width="34" height="44" rx="10" fill="#e36d57"/>
    <text x="6" y="120" fill="#f7ead1" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">short-term parking</text>
  </g>

  <g transform="translate(94 382)" filter="url(#shadow)">
    <rect x="22" y="36" width="98" height="54" rx="18" fill="#dfe9e5"/>
    <path d="M40 36V18h62v18" fill="none" stroke="#2f4b55" stroke-width="10" stroke-linecap="round"/>
    <circle cx="40" cy="104" r="14" fill="#22313a"/>
    <circle cx="112" cy="104" r="14" fill="#22313a"/>
    <path d="M46 62h48M46 82h62" stroke="#62736d" stroke-width="7" stroke-linecap="round"/>
    <text x="-4" y="144" fill="#f7ead1" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">luggage trolley</text>
  </g>

  <g transform="translate(762 196)" filter="url(#shadow)">
    <rect width="122" height="116" rx="24" fill="#263944"/>
    <path d="M26 38h70M26 72h50" stroke="#f7ead1" stroke-width="8" stroke-linecap="round"/>
    <path d="M26 94h70" stroke="#e36d57" stroke-width="9" stroke-linecap="round"/>
    <circle cx="92" cy="36" r="11" fill="#ffcb65"/>
    <text x="-8" y="154" fill="#394b50" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">night entrance closed</text>
  </g>

  <g transform="translate(442 360)" filter="url(#shadow)">
    <path d="M0 0c20-44 88-44 108 0" fill="none" stroke="#2d4650" stroke-width="13" stroke-linecap="round"/>
    <path d="M12 0v54M96 0v54" stroke="#2d4650" stroke-width="15" stroke-linecap="round"/>
    <rect x="88" y="40" width="58" height="18" rx="9" fill="#2d4650"/>
    <circle cx="150" cy="49" r="9" fill="#ffcb65"/>
    <text x="-8" y="96" fill="#f7ead1" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">support fallback</text>
  </g>

  <g filter="url(#shadow)">
    <path d="M520 326c0-50 68-90 110-48 38 38 2 100-110 174-112-74-148-136-110-174 42-42 110-2 110 48z" fill="url(#marker)"/>
    <circle cx="520" cy="328" r="26" fill="#fff8e7"/>
    <text x="504" y="337" fill="#c85444" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="900">1</text>
    <text x="462" y="488" fill="#394b50" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800">shared meeting point</text>
  </g>

  <path d="M408 204c54 18 92 48 112 92" fill="none" stroke="#4c9b98" stroke-width="9" stroke-linecap="round" stroke-dasharray="13 16" opacity=".9"/>
  <path d="M644 236c-46 18-82 48-108 88" fill="none" stroke="#e36d57" stroke-width="9" stroke-linecap="round" stroke-dasharray="13 16" opacity=".9"/>
  <path d="M274 382c82-4 156 20 232 70" fill="none" stroke="#ffcb65" stroke-width="9" stroke-linecap="round" stroke-dasharray="13 16" opacity=".9"/>
  <path d="M764 390c-78 0-146 22-218 62" fill="none" stroke="#73a6c9" stroke-width="9" stroke-linecap="round" stroke-dasharray="13 16" opacity=".9"/>
  <path d="M514 296l18 30-35-2M536 324l34-5-18 30M506 452l-34-8 24-26M546 452l32-14-10 34" fill="none" stroke="#fff8e7" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity=".92"/>

  <text x="78" y="64" fill="#34484f" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">one route, three languages, one owner</text>
  <text x="78" y="98" fill="#657875" font-family="Inter, Arial, sans-serif" font-size="16">gate, driver, hotel note, parking, night closure, support fallback, shared version</text>
</svg>
