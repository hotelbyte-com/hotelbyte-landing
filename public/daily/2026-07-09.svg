<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Revenue desk calendar connecting city demand to hotel rates</title>
  <desc id="desc">An overhead editorial revenue desk shows a marked monthly calendar, trade-show circle, school-holiday sticky note, arena extra-show reminder, rate-curve screen, competitor-rate card, group-release clip, coffee, and inventory chips.</desc>
  <defs>
    <linearGradient id="desk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eaf0e8"/>
      <stop offset="0.45" stop-color="#d8e0d3"/>
      <stop offset="1" stop-color="#826f63"/>
    </linearGradient>
    <linearGradient id="calendarPaper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff8df"/>
      <stop offset="1" stop-color="#e6d6b4"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#213844"/>
      <stop offset="1" stop-color="#0f2029"/>
    </linearGradient>
    <linearGradient id="note" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f9df6e"/>
      <stop offset="1" stop-color="#e7a95a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#3b3b35" flood-opacity=".22"/>
    </filter>
  </defs>

  <rect width="960" height="540" rx="28" fill="url(#desk)"/>
  <path d="M74 84h812M104 126h710M92 454h774" stroke="#fff8e8" stroke-width="8" stroke-linecap="round" opacity=".46"/>
  <path d="M130 414c106 34 242 28 406-18M596 92c84-22 162-14 236 24" fill="none" stroke="#314840" stroke-width="8" stroke-linecap="round" opacity=".15"/>
  <rect x="78" y="374" width="808" height="78" rx="26" fill="#6b5146" opacity=".16"/>

  <g transform="translate(300 62) rotate(-2)" filter="url(#shadow)">
    <rect x="-20" y="-18" width="390" height="420" rx="30" fill="#9f7658"/>
    <rect x="16" y="16" width="318" height="354" rx="24" fill="url(#calendarPaper)"/>
    <rect x="58" y="-2" width="178" height="42" rx="18" fill="#243843"/>
    <path d="M96 15h100" stroke="#f3c85b" stroke-width="8" stroke-linecap="round"/>

    <g transform="translate(42 74)">
      <path d="M0 0h244M0 46h244M0 92h244M0 138h244M0 184h244" stroke="#a99b84" stroke-width="5" stroke-linecap="round" opacity=".54"/>
      <path d="M40-20v226M82-20v226M124-20v226M166-20v226M208-20v226" stroke="#a99b84" stroke-width="5" stroke-linecap="round" opacity=".42"/>
      <path d="M164 42c26-22 66 12 34 38-24 20-72 0-48-28" fill="none" stroke="#c6464b" stroke-width="10" stroke-linecap="round"/>
      <path d="M32 132h44M32 150h58" stroke="#58756c" stroke-width="8" stroke-linecap="round"/>
      <path d="M126 176h54M126 194h78" stroke="#58756c" stroke-width="8" stroke-linecap="round"/>
      <circle cx="218" cy="98" r="13" fill="#4d9a91"/>
      <circle cx="74" cy="52" r="11" fill="#efbf54"/>
      <path d="M204 30l24 18-30 8" fill="none" stroke="#31484d" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <g transform="translate(54 294)">
      <rect width="210" height="50" rx="17" fill="#fff9e8" stroke="#d1a667" stroke-width="4"/>
      <path d="M26 20h72M26 34h124" stroke="#695d48" stroke-width="7" stroke-linecap="round"/>
      <circle cx="168" cy="22" r="10" fill="#c6464b"/>
    </g>
    <text x="52" y="398" fill="#574d3e" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700">city demand calendar</text>
  </g>

  <g transform="translate(70 92) rotate(3)" filter="url(#shadow)">
    <rect width="214" height="172" rx="24" fill="url(#screen)"/>
    <path d="M30 124h150" stroke="#dbe9e3" stroke-width="7" stroke-linecap="round" opacity=".62"/>
    <path d="M34 106c30-44 54-18 80-52 28-36 58-8 78-32" fill="none" stroke="#58b7a5" stroke-width="9" stroke-linecap="round"/>
    <path d="M34 132c40-18 78-16 116-34" fill="none" stroke="#f3c85b" stroke-width="7" stroke-linecap="round" stroke-dasharray="9 12"/>
    <circle cx="116" cy="54" r="10" fill="#f3c85b"/>
    <text x="16" y="214" fill="#435a55" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">rate curve</text>
  </g>

  <g transform="translate(678 78) rotate(5)" filter="url(#shadow)">
    <rect width="178" height="126" rx="24" fill="#f2f8f4"/>
    <rect x="22" y="22" width="66" height="28" rx="12" fill="#c6464b"/>
    <path d="M24 76h68M24 100h112" stroke="#52665e" stroke-width="8" stroke-linecap="round"/>
    <circle cx="132" cy="36" r="12" fill="#4d9a91"/>
    <text x="2" y="166" fill="#4e5f59" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">competitor move</text>
  </g>

  <g transform="translate(690 254)" filter="url(#shadow)">
    <rect width="158" height="108" rx="24" fill="#fff9e8"/>
    <path d="M24 34h80M24 64h112M24 88h68" stroke="#6a5d48" stroke-width="8" stroke-linecap="round"/>
    <path d="M110 28l28 20-36 8" fill="none" stroke="#c6464b" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="-6" y="148" fill="#f5efdc" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">group release</text>
  </g>

  <g transform="translate(626 388)" filter="url(#shadow)">
    <circle cx="46" cy="46" r="42" fill="#f5ead5"/>
    <circle cx="46" cy="46" r="28" fill="#704738"/>
    <path d="M78 40c34 0 34 34 0 34" fill="none" stroke="#f5ead5" stroke-width="10" stroke-linecap="round"/>
    <path d="M24 38c14 12 30 12 46 0" fill="none" stroke="#bf8a54" stroke-width="6" stroke-linecap="round"/>
    <text x="-8" y="110" fill="#4e5f59" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">second coffee</text>
  </g>

  <g transform="translate(104 314)" filter="url(#shadow)">
    <rect width="170" height="90" rx="22" fill="url(#note)"/>
    <path d="M26 32h72M26 58h116" stroke="#6f5134" stroke-width="8" stroke-linecap="round"/>
    <circle cx="130" cy="30" r="11" fill="#c6464b"/>
    <text x="0" y="128" fill="#5b594b" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">school holiday</text>
  </g>

  <g transform="translate(210 406)" filter="url(#shadow)">
    <circle cx="28" cy="28" r="26" fill="#c6464b"/>
    <circle cx="82" cy="30" r="26" fill="#4d9a91"/>
    <circle cx="136" cy="20" r="22" fill="#f3c85b"/>
    <circle cx="188" cy="34" r="24" fill="#2f4750"/>
    <path d="M16 28h24M70 30h24M124 20h24M176 34h24" stroke="#fff7df" stroke-width="6" stroke-linecap="round" opacity=".72"/>
    <text x="2" y="84" fill="#4f5d56" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">inventory chips</text>
  </g>

  <g transform="translate(568 182) rotate(-7)" filter="url(#shadow)">
    <rect width="138" height="88" rx="22" fill="#e4f1ed"/>
    <path d="M24 30h50M24 56h88" stroke="#526b63" stroke-width="8" stroke-linecap="round"/>
    <path d="M96 22l22 18-28 8" fill="none" stroke="#4d9a91" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="-4" y="126" fill="#4e625b" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">arena maybe +1</text>
  </g>

  <path d="M284 178c54-30 90-42 132-42M624 156c-58-12-104-6-138 18M672 304c-58 10-112 8-164-8M294 360c48-20 86-46 114-78" fill="none" stroke="#f3c85b" stroke-width="8" stroke-linecap="round" stroke-dasharray="12 16" opacity=".88"/>
  <path d="M486 174l28-4-14 24" fill="none" stroke="#f3c85b" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="78" y="66" fill="#40554f" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">rates listen to the city first</text>
  <text x="78" y="100" fill="#66746d" font-family="Inter, Arial, sans-serif" font-size="16">calendar, event, holiday, group block, inventory, timing</text>
</svg>
