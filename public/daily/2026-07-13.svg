    <rect width="178" height="250" rx="30" fill="#fff9e6"/>
    <path d="M44 42h90M44 78h64M44 114h86M44 150h54" stroke="#596b64" stroke-width="9" stroke-linecap="round"/>
    <rect x="38" y="178" width="104" height="42" rx="16" fill="#d85d50"/>
