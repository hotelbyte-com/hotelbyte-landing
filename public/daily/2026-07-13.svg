<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Supplier allotment release clock on an operations desk</title>
  <desc id="desc">A supplier operations desk shows an allotment sheet, yellow release countdown, held-room chips, trade-show calendar, partner pickup card, release-rule note, rate tag, and arrows returning rooms to the sellable pool.</desc>
  <defs>
    <linearGradient id="desk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef3ea"/>
      <stop offset="0.45" stop-color="#cbd9cf"/>
      <stop offset="1" stop-color="#5f6f76"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#253a44"/>
      <stop offset="1" stop-color="#101a21"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff9e6"/>
      <stop offset="1" stop-color="#e6d6ad"/>
    </linearGradient>
    <linearGradient id="pool" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#dff3ed"/>
      <stop offset="1" stop-color="#72aaa4"/>
    </linearGradient>
    <linearGradient id="warning" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe28a"/>
      <stop offset="1" stop-color="#d9903d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#243036" flood-opacity=".24"/>
    </filter>
  </defs>

  <rect width="960" height="540" rx="28" fill="url(#desk)"/>
  <path d="M78 78h804M104 122h724M92 452h776" stroke="#fff9e8" stroke-width="8" stroke-linecap="round" opacity=".44"/>
  <path d="M100 398c126-28 258-28 396 0 118 24 238 16 358-26" fill="none" stroke="#ffffff" stroke-width="9" stroke-linecap="round" opacity=".28"/>

  <g transform="translate(78 116)" filter="url(#shadow)">
    <rect width="312" height="260" rx="30" fill="url(#screen)"/>
    <rect x="28" y="28" width="256" height="48" rx="18" fill="#edf7ef"/>
    <path d="M52 52h94M166 52h62" stroke="#526861" stroke-width="8" stroke-linecap="round"/>
    <circle cx="250" cy="52" r="11" fill="#d85d50"/>
    <rect x="28" y="106" width="256" height="104" rx="20" fill="#f7fbf3"/>
    <path d="M50 138h66M140 138h42M204 138h42M50 170h72M140 170h38M204 170h46" stroke="#526861" stroke-width="8" stroke-linecap="round"/>
    <rect x="192" y="154" width="70" height="36" rx="14" fill="url(#warning)"/>
    <text x="202" y="179" fill="#65421f" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">18:00</text>
    <text x="32" y="300" fill="#3f5352" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">allotment sheet</text>
  </g>

  <g transform="translate(342 76) rotate(-2)" filter="url(#shadow)">
    <rect width="288" height="366" rx="30" fill="url(#paper)"/>
    <rect x="28" y="28" width="232" height="50" rx="18" fill="#2d4650"/>
    <path d="M52 54h84M158 54h64" stroke="#f4c964" stroke-width="8" stroke-linecap="round"/>
    <text x="42" y="120" fill="#425852" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">TRADESHOW DATE</text>
    <text x="42" y="150" fill="#68776f" font-family="Inter, Arial, sans-serif" font-size="16">hold reason + release rule</text>
    <g transform="translate(40 184)">
      <rect width="208" height="96" rx="22" fill="#fffdf1"/>
      <path d="M24 32h66M24 62h92M132 32h42M132 62h56" stroke="#5a675f" stroke-width="8" stroke-linecap="round"/>
      <rect x="138" y="20" width="46" height="50" rx="14" fill="url(#warning)"/>
      <text x="148" y="52" fill="#684520" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900">12</text>
    </g>
    <g transform="translate(44 304)">
      <rect width="154" height="34" rx="15" fill="#d85d50"/>
      <path d="M24 17h94" stroke="#fff1da" stroke-width="7" stroke-linecap="round"/>
    </g>
    <text x="52" y="356" fill="#425852" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">not sold yet, not free yet</text>
  </g>

  <g transform="translate(654 92)" filter="url(#shadow)">
    <rect width="214" height="150" rx="26" fill="#fff9e6"/>
    <rect x="28" y="26" width="92" height="32" rx="15" fill="#55a094"/>
    <path d="M30 84h82M30 112h138" stroke="#5d665f" stroke-width="8" stroke-linecap="round"/>
    <circle cx="166" cy="42" r="13" fill="#d85d50"/>
    <text x="8" y="188" fill="#455954" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">partner pickup card</text>
  </g>

  <g transform="translate(648 284)" filter="url(#shadow)">
    <rect width="222" height="130" rx="28" fill="url(#pool)"/>
    <path d="M32 42h78M32 74h118" stroke="#27565a" stroke-width="9" stroke-linecap="round"/>
    <g transform="translate(146 32)">
      <circle cx="18" cy="18" r="18" fill="#fff9e6"/>
      <circle cx="58" cy="18" r="18" fill="#fff9e6"/>
      <circle cx="38" cy="58" r="18" fill="#fff9e6"/>
      <text x="10" y="66" fill="#31565a" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="900">R</text>
    </g>
    <text x="18" y="168" fill="#455954" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">sellable pool</text>
  </g>

  <g transform="translate(102 396)" filter="url(#shadow)">
    <rect width="154" height="70" rx="22" fill="#f7efe0"/>
    <path d="M26 28h62M26 48h92" stroke="#665a49" stroke-width="8" stroke-linecap="round"/>
    <circle cx="120" cy="28" r="11" fill="#55a094"/>
    <text x="-4" y="108" fill="#f8efe0" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">rate tag</text>
  </g>

  <g transform="translate(274 388)" filter="url(#shadow)">
    <rect width="126" height="70" rx="22" fill="url(#warning)"/>
    <text x="28" y="45" fill="#64411e" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="900">12</text>
    <path d="M72 34h26" stroke="#64411e" stroke-width="8" stroke-linecap="round"/>
    <text x="-10" y="108" fill="#f8efe0" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">held rooms</text>
  </g>

  <g transform="translate(454 382)" filter="url(#shadow)">
    <rect width="146" height="76" rx="22" fill="#2d4650"/>
    <path d="M28 30h64M28 52h90" stroke="#f4c964" stroke-width="8" stroke-linecap="round"/>
    <circle cx="112" cy="30" r="11" fill="#d85d50"/>
    <text x="-6" y="114" fill="#f8efe0" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">manual confirm</text>
  </g>

  <path d="M390 236c54-28 104-34 150-18M630 174c34-6 62-6 88 0M596 310c46 18 86 22 126 12M398 424c40-12 76-14 108-6" fill="none" stroke="#f4c964" stroke-width="8" stroke-linecap="round" stroke-dasharray="12 16" opacity=".9"/>
  <path d="M540 218l34 8-26 22M718 174l30 16-30 18M722 322l34 6-22 24M506 418l32-12-10 30" fill="none" stroke="#f4c964" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity=".9"/>

  <text x="78" y="64" fill="#344c50" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">allotment needs a release clock</text>
  <text x="78" y="98" fill="#5e7270" font-family="Inter, Arial, sans-serif" font-size="16">hold reason, pickup, release rule, rate, manual confirmation, sellable pool</text>
</svg>
