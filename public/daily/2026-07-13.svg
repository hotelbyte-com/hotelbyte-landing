<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Hotel luggage storage tag holding the pause</title>
  <desc id="desc">A cutaway hotel luggage storage room shows paired number tags, shelves, suitcases, a folded stroller, refrigerated medicine box, passport reminder, group pickup list, umbrella, and a doorway back to the city.</desc>
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e9f0e7"/>
      <stop offset="0.48" stop-color="#c9dccf"/>
      <stop offset="1" stop-color="#8aa3a2"/>
    </linearGradient>
    <linearGradient id="doorLight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6d372"/>
      <stop offset="1" stop-color="#ec875c"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b98961"/>
      <stop offset="1" stop-color="#5c4a3c"/>
    </linearGradient>
    <linearGradient id="tag" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff5cc"/>
      <stop offset="1" stop-color="#f0bd55"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#263238" flood-opacity=".24"/>
    </filter>
  </defs>

  <rect width="960" height="540" rx="28" fill="url(#wall)"/>
  <path d="M76 76h808M104 118h728M88 454h784" stroke="#fff9e8" stroke-width="8" stroke-linecap="round" opacity=".48"/>
  <rect x="78" y="352" width="804" height="116" rx="28" fill="url(#floor)"/>
  <path d="M116 398h716M150 434h636" stroke="#efd6aa" stroke-width="8" stroke-linecap="round" opacity=".34"/>

  <g transform="translate(84 114)" filter="url(#shadow)">
    <rect width="340" height="244" rx="28" fill="#48626a"/>
    <path d="M28 70h282M28 142h282M28 214h282M112 28v186M220 28v186" stroke="#9eb6b3" stroke-width="7" stroke-linecap="round" opacity=".72"/>
    <g transform="translate(42 42)">
      <rect width="82" height="72" rx="18" fill="#1f2d35"/>
      <path d="M22 0v-20h38V0" fill="none" stroke="#f0bd55" stroke-width="8" stroke-linecap="round"/>
      <path d="M20 30h40M20 50h30" stroke="#dfe9e3" stroke-width="7" stroke-linecap="round"/>
      <circle cx="22" cy="84" r="10" fill="#16232a"/>
