    <path d="M42 26h58M42 54h80" stroke="#72542f" stroke-width="8" stroke-linecap="round"/>
    <circle cx="28" cy="44" r="12" fill="#fff9e6" stroke="#72542f" stroke-width="5"/>
    <path d="M124 18v52" stroke="#b47a31" stroke-width="5" stroke-linecap="round" stroke-dasharray="8 8"/>
    <text x="104" y="52" fill="#72542f" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">42</text>
  </g>

  <g transform="translate(114 362)" filter="url(#shadow)">
    <path d="M60 0c28 32 28 72 0 112" fill="none" stroke="#28424b" stroke-width="12" stroke-linecap="round"/>
    <path d="M26 56h88" stroke="#28424b" stroke-width="12" stroke-linecap="round"/>
    <path d="M26 108h88" stroke="#28424b" stroke-width="10" stroke-linecap="round"/>
    <circle cx="26" cy="122" r="12" fill="#1b2a31"/>
    <circle cx="114" cy="122" r="12" fill="#1b2a31"/>
    <path d="M56 32c28-16 58-14 92 6" fill="none" stroke="#d96a55" stroke-width="8" stroke-linecap="round"/>
    <text x="-8" y="164" fill="#f5ead7" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">folded stroller</text>
  </g>

  <g transform="translate(506 374)" filter="url(#shadow)">
    <rect width="148" height="74" rx="22" fill="#253944"/>
    <path d="M26 30h72M26 52h50" stroke="#eaf4ed" stroke-width="8" stroke-linecap="round"/>
    <circle cx="114" cy="34" r="12" fill="#f0bd55"/>
    <text x="-4" y="112" fill="#f5ead7" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">passport pouch?</text>
  </g>

  <g transform="translate(692 382)" filter="url(#shadow)">
    <path d="M40 0c22 22 22 64 0 86" fill="none" stroke="#f0bd55" stroke-width="13" stroke-linecap="round"/>
    <path d="M20 42h70" stroke="#f0bd55" stroke-width="13" stroke-linecap="round"/>
    <path d="M40 86v36c0 18 24 18 24 0" fill="none" stroke="#31474a" stroke-width="9" stroke-linecap="round"/>
    <text x="-8" y="152" fill="#f5ead7" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">rain pickup space</text>
  </g>

  <path d="M424 236c-54-30-98-44-134-42M598 226c-34-16-66-18-98-6M600 278c44 12 82 8 116-12M370 398c-58-18-104-18-138 0M456 402c28-18 58-24 90-18" fill="none" stroke="#fff6d0" stroke-width="8" stroke-linecap="round" stroke-dasharray="12 16" opacity=".9"/>
  <path d="M290 194l-32-10 24-22M716 266l34-8-18 28M546 384l30-12-8 32" fill="none" stroke="#fff6d0" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity=".9"/>

  <text x="78" y="64" fill="#344c50" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">the luggage tag holds the pause</text>
  <text x="78" y="98" fill="#5e7370" font-family="Inter, Arial, sans-serif" font-size="16">ticket, shelf, bag count, special note, release proof, one more walk</text>
</svg>
