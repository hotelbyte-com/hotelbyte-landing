    </g>
    <g transform="translate(154 38)">
      <rect width="70" height="78" rx="18" fill="#2f3d46"/>
      <path d="M18 34h34M18 56h24" stroke="#e7efe7" stroke-width="7" stroke-linecap="round"/>
      <circle cx="18" cy="90" r="9" fill="#17242b"/>
      <circle cx="52" cy="90" r="9" fill="#17242b"/>
    </g>
    <g transform="translate(252 42)">
      <rect width="54" height="74" rx="16" fill="#d96a55"/>
      <path d="M18 28h18M14 48h28" stroke="#fff0d2" stroke-width="7" stroke-linecap="round"/>
      <circle cx="16" cy="86" r="8" fill="#17242b"/>
      <circle cx="40" cy="86" r="8" fill="#17242b"/>
    </g>
    <g transform="translate(50 150)">
      <rect x="0" y="24" width="98" height="50" rx="16" fill="#e6efe9"/>
      <path d="M22 24V0h56v24" fill="none" stroke="#36535b" stroke-width="8" stroke-linecap="round"/>
