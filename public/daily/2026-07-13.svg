    <rect width="202" height="270" rx="30" fill="#e8f5ef"/>
    <rect x="32" y="34" width="138" height="80" rx="22" fill="#20404e"/>
    <path d="M56 66h66M56 92h86" stroke="#eaf6ef" stroke-width="8" stroke-linecap="round"/>
    <circle cx="148" cy="64" r="12" fill="#f0bd55"/>
    <rect x="44" y="142" width="112" height="72" rx="22" fill="#d8f0f0"/>
    <path d="M76 154v48M52 178h96" stroke="#4a8f88" stroke-width="9" stroke-linecap="round"/>
    <rect x="64" y="222" width="76" height="24" rx="12" fill="#f0bd55"/>
    <text x="16" y="308" fill="#435851" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">medicine needs a note</text>
  </g>

  <g transform="translate(762 126)" filter="url(#shadow)">
