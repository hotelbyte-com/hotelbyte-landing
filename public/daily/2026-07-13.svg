      <path d="M22 24h46M22 40h62" stroke="#695e4d" stroke-width="7" stroke-linecap="round"/>
      <circle cx="82" cy="24" r="10" fill="#4da391"/>
    </g>
    <text x="24" y="284" fill="#385056" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">shelf space, not a guessing pile</text>
  </g>

