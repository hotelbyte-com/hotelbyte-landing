    <path d="M18 224c30-28 64-42 104-40" fill="none" stroke="#fff3cf" stroke-width="9" stroke-linecap="round" opacity=".82"/>
    <path d="M24 62h64M24 94h42" stroke="#724b38" stroke-width="8" stroke-linecap="round" opacity=".58"/>
    <circle cx="100" cy="134" r="9" fill="#704937"/>
    <text x="-8" y="298" fill="#4b5b55" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">city gets one more walk</text>
  </g>

  <g transform="translate(296 356)" filter="url(#shadow)">
