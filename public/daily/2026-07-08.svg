<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Hotel tour desk local festival flyer for a free half-day</title>
  <desc id="desc">An editorial tour-desk still life shows a local festival flyer, hotel key card, half coffee, umbrella, shuttle ticket, city map, craft market icons, accessible route marker, and timing note for a guest with a free half-day.</desc>
