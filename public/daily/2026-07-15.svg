<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Channel operations stop-sell list with reasons</title>
  <desc id="desc">A channel operations desk shows a red stop-sell list, room-type chips, reason-code card, reopening-condition note, expiry clock, revenue rate tag, supplier evidence file, owner badge, and grey arrow toward the sellable pool.</desc>
  <defs>
    <linearGradient id="desk" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#edf3ec"/>
      <stop offset="0.48" stop-color="#c7d7d0"/>
      <stop offset="1" stop-color="#586a73"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#243a44"/>
      <stop offset="1" stop-color="#111b22"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff9e9"/>
      <stop offset="1" stop-color="#dfcfaa"/>
    </linearGradient>
    <linearGradient id="closed" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f07a67"/>
      <stop offset="1" stop-color="#b93d3d"/>
    </linearGradient>
    <linearGradient id="pool" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#dff0eb"/>
      <stop offset="1" stop-color="#75aaa2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#243038" flood-opacity=".24"/>
    </filter>
  </defs>

  <rect width="960" height="540" rx="28" fill="url(#desk)"/>
  <path d="M78 78h804M108 120h714M88 454h784" stroke="#fff8e8" stroke-width="8" stroke-linecap="round" opacity=".44"/>
  <path d="M96 398c126-28 260-28 402 2 122 26 244 16 360-30" fill="none" stroke="#ffffff" stroke-width="9" stroke-linecap="round" opacity=".28"/>

  <g transform="translate(72 102)" filter="url(#shadow)">
    <rect width="330" height="286" rx="30" fill="url(#screen)"/>
    <rect x="28" y="28" width="274" height="50" rx="18" fill="#eef8f0"/>
    <path d="M52 54h84M158 54h72" stroke="#526961" stroke-width="8" stroke-linecap="round"/>
    <circle cx="268" cy="54" r="11" fill="#d64e49"/>
    <g transform="translate(28 104)">
      <rect width="274" height="42" rx="16" fill="url(#closed)"/>
      <path d="M24 21h82M132 21h42M204 21h38" stroke="#fff4dc" stroke-width="8" stroke-linecap="round"/>
    </g>
    <g transform="translate(28 160)">
      <rect width="274" height="42" rx="16" fill="#f7fbf3"/>
      <path d="M24 21h70M124 21h56M210 21h34" stroke="#607269" stroke-width="8" stroke-linecap="round"/>
    </g>
    <g transform="translate(28 216)">
      <rect width="274" height="42" rx="16" fill="url(#closed)"/>
      <path d="M24 21h88M140 21h48M218 21h28" stroke="#fff4dc" stroke-width="8" stroke-linecap="round"/>
    </g>
    <text x="30" y="330" fill="#3e5354" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">stop-sell list with reasons</text>
  </g>

  <g transform="translate(356 70) rotate(-2)" filter="url(#shadow)">
    <rect width="276" height="354" rx="30" fill="url(#paper)"/>
    <rect x="28" y="28" width="220" height="44" rx="16" fill="#2d4650"/>
    <path d="M52 50h70M144 50h58" stroke="#f4c766" stroke-width="8" stroke-linecap="round"/>
    <text x="40" y="116" fill="#405753" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">REASON CODE</text>
    <path d="M42 146h96M42 176h156M42 206h122" stroke="#69756c" stroke-width="8" stroke-linecap="round"/>
    <rect x="170" y="132" width="62" height="82" rx="18" fill="url(#closed)"/>
    <text x="184" y="182" fill="#fff5df" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="900">R2</text>
    <g transform="translate(40 248)">
      <rect width="190" height="58" rx="20" fill="#fffdf2"/>
      <path d="M24 28h72M118 28h42" stroke="#5f6a62" stroke-width="8" stroke-linecap="round"/>
      <circle cx="162" cy="28" r="11" fill="#55a094"/>
    </g>
    <text x="46" y="342" fill="#405753" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">scope, trigger, reopen rule</text>
  </g>

  <g transform="translate(656 78)" filter="url(#shadow)">
    <rect width="212" height="148" rx="26" fill="#fff9e9"/>
    <circle cx="62" cy="64" r="38" fill="#f4c766"/>
    <path d="M62 64V32M62 64l26 18" stroke="#654927" stroke-width="8" stroke-linecap="round"/>
    <path d="M124 48h52M124 78h36" stroke="#5f6a62" stroke-width="8" stroke-linecap="round"/>
    <text x="10" y="186" fill="#455954" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">expiry clock</text>
  </g>

  <g transform="translate(650 272)" filter="url(#shadow)">
    <rect width="222" height="136" rx="28" fill="url(#pool)"/>
    <path d="M32 42h80M32 76h126" stroke="#27565a" stroke-width="9" stroke-linecap="round"/>
    <g transform="translate(150 30)">
      <circle cx="18" cy="18" r="18" fill="#fff9e9"/>
      <circle cx="58" cy="18" r="18" fill="#fff9e9"/>
      <circle cx="38" cy="58" r="18" fill="#fff9e9"/>
      <text x="9" y="66" fill="#31565a" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="900">S</text>
    </g>
    <text x="18" y="174" fill="#455954" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">sellable pool waits</text>
  </g>

  <g transform="translate(92 404)" filter="url(#shadow)">
    <rect width="154" height="68" rx="22" fill="#fff4d4"/>
    <path d="M26 28h60M26 48h94" stroke="#665a49" stroke-width="8" stroke-linecap="round"/>
    <circle cx="118" cy="28" r="11" fill="#55a094"/>
    <text x="-2" y="106" fill="#fff4d4" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">owner badge</text>
  </g>

  <g transform="translate(270 390)" filter="url(#shadow)">
    <rect width="140" height="76" rx="22" fill="#2d4650"/>
    <text x="28" y="48" fill="#f4c766" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="900">AED</text>
    <text x="-6" y="114" fill="#fff4d4" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">revenue rate tag</text>
  </g>

  <g transform="translate(444 388)" filter="url(#shadow)">
    <rect width="160" height="76" rx="22" fill="#fffdf2"/>
    <path d="M26 30h62M26 52h100" stroke="#5a6862" stroke-width="8" stroke-linecap="round"/>
    <rect x="112" y="18" width="26" height="36" rx="9" fill="#d64e49"/>
    <text x="-8" y="114" fill="#fff4d4" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">supplier evidence</text>
  </g>

  <g transform="translate(206 220)" filter="url(#shadow)">
    <circle cx="32" cy="32" r="24" fill="#fff9e9"/>
    <circle cx="92" cy="32" r="24" fill="#fff9e9"/>
    <circle cx="152" cy="32" r="24" fill="#fff9e9"/>
    <path d="M24 32h16M84 32h16M144 32h16" stroke="#43585a" stroke-width="8" stroke-linecap="round"/>
    <text x="-4" y="88" fill="#e9f2ea" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">room-type chips</text>
  </g>

  <path d="M402 236c46-26 86-32 122-18M632 150c34-8 64-6 90 6M604 318c48 18 88 22 126 12M410 426c42-14 78-14 110 0" fill="none" stroke="#f4c766" stroke-width="8" stroke-linecap="round" stroke-dasharray="12 16" opacity=".9"/>
  <path d="M524 218l34 8-26 24M722 156l30 18-32 16M730 330l34 6-22 24M520 426l32-12-10 32" fill="none" stroke="#f4c766" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity=".9"/>
  <path d="M610 330c-42-28-84-42-126-42" fill="none" stroke="#8b99a0" stroke-width="10" stroke-linecap="round" stroke-dasharray="18 18" opacity=".72"/>

  <text x="78" y="64" fill="#344c50" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">stop-sell needs a reason, not just a switch</text>
  <text x="78" y="98" fill="#5e7270" font-family="Inter, Arial, sans-serif" font-size="16">scope, reason, trigger source, reopen condition, expiry, owner, sellable pool</text>
</svg>
