<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Beach hotel room with drying line and floor drain</title>
  <desc id="desc">A cutaway beach-hotel long-stay room shows a balcony drying line with swimsuits and towels, snorkel mask, children’s sandals, sand, bathroom floor drain, spare towel basket, room-type card, and housekeeping cart.</desc>
