      <text x="16" y="152" fill="#6b5a49" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">claim register</text>
    </g>

    <g transform="translate(122 194)">
      <rect x="0" y="0" width="142" height="52" rx="15" fill="#f4ead2"/>
      <path d="M24 20h54M24 36h84" stroke="#755f48" stroke-width="7" stroke-linecap="round"/>
      <circle cx="114" cy="18" r="10" fill="#d96b55"/>
      <path d="M4 52l30-18h76l28 18" fill="#e8d7b8"/>
      <text x="4" y="84" fill="#765d45" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">mail home</text>
    </g>

    <g transform="translate(322 194)">
      <rect x="0" y="0" width="126" height="62" rx="16" fill="#5b6f86"/>
