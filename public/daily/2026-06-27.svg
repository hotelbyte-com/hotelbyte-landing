      <text x="4" y="94" fill="#5b6f86" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">travel novel</text>
    </g>

    <g transform="translate(514 194)">
      <rect x="0" y="0" width="92" height="60" rx="16" fill="#ffffff"/>
      <path d="M18 22c20-22 58 18 28 34-18 10-46-2-28-24" fill="none" stroke="#2f6d73" stroke-width="9" stroke-linecap="round"/>
      <circle cx="68" cy="32" r="12" fill="#e7c75c"/>
      <text x="-2" y="92" fill="#4f716e" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">charger</text>
    </g>
  </g>

  <g transform="translate(108 332)" filter="url(#softShadow)">
    <circle cx="76" cy="44" r="30" fill="#b8795d"/>
    <path d="M44 92c8-28 52-37 73-12 18 22 20 72 13 116H34c-5-42-3-78 10-104z" fill="#668f88"/>
    <path d="M77 72v62" stroke="#fff0cf" stroke-width="10" stroke-linecap="round"/>
    <rect x="118" y="88" width="118" height="82" rx="18" fill="#fff7dc"/>
    <path d="M140 116h54M140 142h78" stroke="#635b4f" stroke-width="8" stroke-linecap="round"/>
    <circle cx="204" cy="116" r="10" fill="#72a987"/>
