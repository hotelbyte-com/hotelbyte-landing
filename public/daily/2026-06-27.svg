  <g transform="translate(690 338)" filter="url(#softShadow)">
    <rect width="142" height="86" rx="20" fill="#e9f4ef"/>
    <path d="M22 30h72M22 56h96" stroke="#536760" stroke-width="8" stroke-linecap="round"/>
    <path d="M108 22l18 23-30 2" fill="none" stroke="#d96b55" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="8" y="122" fill="#58706a" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">identity check</text>
  </g>

  <path d="M350 420c78 24 178 24 258 0" fill="none" stroke="#7c5d45" stroke-width="8" stroke-linecap="round" opacity=".24"/>
  <text x="82" y="76" fill="#5c665f" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">after check-out</text>
  <text x="82" y="110" fill="#77857c" font-family="Inter, Arial, sans-serif" font-size="16">found, logged, confirmed, returned</text>
