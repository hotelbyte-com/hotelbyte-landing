    <rect x="28" y="26" width="154" height="42" rx="16" fill="#2f4a54"/>
    <path d="M50 48h62M132 48h28" stroke="#f1c760" stroke-width="8" stroke-linecap="round"/>
    <text x="34" y="106" fill="#3e5554" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">FRIDGE OK</text>
    <path d="M36 136h82M36 164h122" stroke="#63756e" stroke-width="8" stroke-linecap="round"/>
    <rect x="144" y="124" width="42" height="58" rx="14" fill="#78b5b1"/>
