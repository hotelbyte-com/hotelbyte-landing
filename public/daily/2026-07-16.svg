<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Refrigerated medicine cold bag changes the hotel room plan</title>
  <desc id="desc">A hotel lobby side-door scene with a refrigerated medicine bag on a luggage cart, temperature sticker, room-fridge confirmation card, restaurant ice pack, handoff clipboard, housekeeping radio, front desk phone, and a quiet route toward the lift.</desc>
  <defs>
    <linearGradient id="lobbyLight" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7f1df"/>
      <stop offset="0.45" stop-color="#d8e5df"/>
      <stop offset="1" stop-color="#6c7f86"/>
    </linearGradient>
    <linearGradient id="coolBag" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#dff4f7"/>
      <stop offset="0.58" stop-color="#6daeb9"/>
      <stop offset="1" stop-color="#326978"/>
    </linearGradient>
    <linearGradient id="cartMetal" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f4fbf5"/>
      <stop offset="1" stop-color="#8da19e"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff9e9"/>
      <stop offset="1" stop-color="#e5d5af"/>
    </linearGradient>
    <linearGradient id="phone" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#2f4a54"/>
      <stop offset="1" stop-color="#111e25"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#2c3c3f" flood-opacity=".23"/>
    </filter>
  </defs>

  <rect width="960" height="540" rx="28" fill="url(#lobbyLight)"/>
  <path d="M72 82h810M106 124h716M86 454h790" stroke="#fff8e5" stroke-width="8" stroke-linecap="round" opacity=".5"/>
  <path d="M92 390c112-28 232-28 360 0 134 30 266 20 398-30" fill="none" stroke="#ffffff" stroke-width="9" stroke-linecap="round" opacity=".28"/>
  <rect x="668" y="118" width="178" height="260" rx="28" fill="#d7e7e2" opacity=".76"/>
  <path d="M704 166h106M704 214h106M704 262h106M704 310h106" stroke="#f9fff6" stroke-width="9" stroke-linecap="round" opacity=".74"/>
  <path d="M650 382c62-30 126-42 192-36" fill="none" stroke="#f1c760" stroke-width="10" stroke-linecap="round" stroke-dasharray="16 18" opacity=".9"/>
  <path d="M840 344l32 14-28 22" fill="none" stroke="#f1c760" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="694" y="420" fill="#4a5c5a" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">quiet route to lift</text>

