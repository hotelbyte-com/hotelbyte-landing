  </g>

  <g transform="translate(764 72)" filter="url(#shadow)">
    <rect width="120" height="146" rx="26" fill="url(#phone)"/>
    <rect x="18" y="22" width="84" height="88" rx="18" fill="#e7f2ed"/>
    <path d="M36 52h42M36 78h54" stroke="#536c68" stroke-width="7" stroke-linecap="round"/>
    <circle cx="60" cy="124" r="9" fill="#f1c760"/>
    <text x="-2" y="184" fill="#425855" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">front desk phone</text>
  </g>

  <g transform="translate(746 406)" filter="url(#shadow)">
    <rect width="148" height="74" rx="22" fill="#2f4a54"/>
    <circle cx="34" cy="37" r="16" fill="#f1c760"/>
    <path d="M66 28h54M66 50h38" stroke="#eaf3ed" stroke-width="8" stroke-linecap="round"/>
    <text x="-6" y="112" fill="#f8f0dc" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">housekeeping radio</text>
