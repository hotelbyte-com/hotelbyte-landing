  <text x="78" y="64" fill="#344c50" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">a cold bag changes the room plan</text>
  <text x="78" y="98" fill="#5d7070" font-family="Inter, Arial, sans-serif" font-size="16">medicine note, fridge check, ice pack, handoff time, luggage boundary, quiet route</text>
</svg>
