<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Supplier reconciliation attachment names on a finance workbench</title>
  <desc id="desc">An editorial finance and support workbench shows a clearly named supplier reconciliation attachment, spreadsheet rows, circled mismatch, bank receipt, hotel invoice, support ticket, currency tag, version stamp, and connector lines pointing to one bill.</desc>
  <defs>
    <linearGradient id="workbench" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef4f2"/>
      <stop offset="0.46" stop-color="#cfded8"/>
      <stop offset="1" stop-color="#776b6a"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#20323e"/>
      <stop offset="1" stop-color="#101a22"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff9e6"/>
      <stop offset="1" stop-color="#e8d6ad"/>
    </linearGradient>
    <linearGradient id="ledger" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f9fffb"/>
      <stop offset="1" stop-color="#d9ebe3"/>
    </linearGradient>
    <linearGradient id="stamp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e85f55"/>
      <stop offset="1" stop-color="#9e3e4b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#2a3236" flood-opacity=".24"/>
    </filter>
  </defs>

  <rect width="960" height="540" rx="28" fill="url(#workbench)"/>
  <path d="M78 82h804M106 124h712M92 458h776" stroke="#fff9e8" stroke-width="8" stroke-linecap="round" opacity=".48"/>
  <path d="M94 392c118-24 248-22 390 6 116 23 238 16 366-22" fill="none" stroke="#ffffff" stroke-width="9" stroke-linecap="round" opacity=".28"/>
  <rect x="74" y="356" width="812" height="98" rx="28" fill="#766152" opacity=".18"/>

  <g transform="translate(82 92)" filter="url(#shadow)">
    <rect width="318" height="234" rx="28" fill="url(#screen)"/>
    <rect x="28" y="28" width="262" height="54" rx="18" fill="#edf7f1"/>
    <path d="M52 56h122M194 56h54" stroke="#536965" stroke-width="8" stroke-linecap="round"/>
    <circle cx="262" cy="55" r="11" fill="#e85f55"/>
    <rect x="28" y="108" width="262" height="88" rx="20" fill="#fdf7e5"/>
    <path d="M52 136h184M52 164h144" stroke="#5f6259" stroke-width="9" stroke-linecap="round"/>
    <path d="M232 128l26 22-34 7" fill="none" stroke="#36a391" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="30" y="276" fill="#3e5150" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">supplier email</text>
  </g>

  <g transform="translate(312 54) rotate(-2)" filter="url(#shadow)">
    <rect width="356" height="398" rx="30" fill="url(#ledger)"/>
    <rect x="30" y="28" width="296" height="58" rx="20" fill="#243a45"/>
    <path d="M54 56h132M206 56h70" stroke="#f5d46e" stroke-width="8" stroke-linecap="round"/>
    <text x="42" y="122" fill="#435954" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700">DXB-042_June-stays_AED_v3</text>
    <text x="42" y="148" fill="#6f7c75" font-family="Inter, Arial, sans-serif" font-size="16">period, hotel, currency, version</text>

    <g transform="translate(36 180)">
      <rect width="284" height="156" rx="20" fill="#fffdf2"/>
      <path d="M0 42h284M0 84h284M0 126h284M72 0v156M158 0v156M226 0v156" stroke="#a7b6ae" stroke-width="4" opacity=".7"/>
      <path d="M22 24h34M92 24h40M178 24h30M244 24h20" stroke="#536964" stroke-width="7" stroke-linecap="round"/>
      <path d="M22 66h34M92 66h42M178 66h30M244 66h20" stroke="#536964" stroke-width="7" stroke-linecap="round"/>
      <path d="M22 108h34M92 108h42M178 108h30M244 108h20" stroke="#536964" stroke-width="7" stroke-linecap="round"/>
      <path d="M82 94c42-28 98-24 134 5 30 24 2 58-46 52-54-7-98-32-88-57z" fill="none" stroke="#e85f55" stroke-width="8" stroke-linecap="round"/>
      <circle cx="242" cy="108" r="12" fill="#f0c25d"/>
    </g>

    <g transform="translate(218 92) rotate(7)">
      <rect width="108" height="52" rx="18" fill="url(#stamp)"/>
      <text x="24" y="34" fill="#fff6e6" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800">v3</text>
    </g>
    <text x="74" y="374" fill="#435954" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">one bill, not three guesses</text>
  </g>

  <g transform="translate(690 82) rotate(4)" filter="url(#shadow)">
    <rect width="186" height="132" rx="24" fill="url(#paper)"/>
    <rect x="24" y="24" width="64" height="28" rx="12" fill="#36a391"/>
    <path d="M26 68h78M26 94h118" stroke="#645848" stroke-width="8" stroke-linecap="round"/>
    <circle cx="142" cy="38" r="12" fill="#e85f55"/>
    <text x="8" y="170" fill="#586460" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">hotel invoice</text>
  </g>

  <g transform="translate(706 258) rotate(-5)" filter="url(#shadow)">
    <rect width="174" height="126" rx="24" fill="#e9f5f0"/>
    <path d="M26 34h72M26 62h116M26 90h82" stroke="#536b65" stroke-width="8" stroke-linecap="round"/>
    <path d="M126 28l26 22-34 7" fill="none" stroke="#e85f55" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="-2" y="164" fill="#586460" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">support ticket</text>
  </g>

  <g transform="translate(96 356) rotate(-3)" filter="url(#shadow)">
    <rect width="210" height="94" rx="24" fill="#fff8e6"/>
    <rect x="28" y="24" width="70" height="28" rx="12" fill="#f0c25d"/>
    <path d="M30 70h76M124 70h46" stroke="#685947" stroke-width="8" stroke-linecap="round"/>
    <circle cx="162" cy="38" r="12" fill="#36a391"/>
    <text x="8" y="132" fill="#4f5f5d" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">bank receipt</text>
  </g>

  <g transform="translate(546 384)" filter="url(#shadow)">
    <rect width="142" height="62" rx="20" fill="#243a45"/>
    <text x="28" y="40" fill="#f5d46e" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">AED</text>
    <text x="6" y="100" fill="#4f5f5d" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">currency tag</text>
  </g>

  <g transform="translate(718 410)" filter="url(#shadow)">
    <rect width="126" height="58" rx="20" fill="#fffdf2"/>
    <path d="M22 26h48M22 42h78" stroke="#5a6862" stroke-width="7" stroke-linecap="round"/>
    <circle cx="96" cy="27" r="10" fill="#36a391"/>
    <text x="-6" y="96" fill="#4f5f5d" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">closed loop</text>
  </g>

  <path d="M400 210c-46-30-86-46-126-48M636 184c36-14 66-26 92-36M626 286c38 10 76 14 118 10M390 346c-46 22-88 36-128 42M604 356c-18 22-28 42-30 62M626 332c50 28 84 58 104 88" fill="none" stroke="#f0c25d" stroke-width="8" stroke-linecap="round" stroke-dasharray="12 16" opacity=".88"/>
  <path d="M274 162l-32-6 20-24M728 148l32-6-18 26M744 296l28 16-28 16M262 388l-32 12 10-32M574 418l18-28 16 30M730 420l34 6-22 24" fill="none" stroke="#f0c25d" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity=".88"/>

  <text x="78" y="62" fill="#31474a" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">the filename starts the reconciliation</text>
  <text x="78" y="96" fill="#5d7270" font-family="Inter, Arial, sans-serif" font-size="16">object, period, currency, version, status, owner</text>
</svg>
