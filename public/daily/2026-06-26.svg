<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Housekeeping cart in a daylight hotel corridor</title>
  <desc id="desc">A housekeeping cart in a bright hotel corridor shows towels, linen, amenities, cleaning tools, room status, maintenance, and lost property turning rooms into real inventory.</desc>
  <defs>
    <linearGradient id="corridor" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef7f3"/>
      <stop offset="0.55" stop-color="#d8e9e4"/>
      <stop offset="1" stop-color="#f5d08c"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e6c787"/>
      <stop offset="1" stop-color="#b98b55"/>
    </linearGradient>
    <linearGradient id="cartMetal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef4f1"/>
      <stop offset="1" stop-color="#8aa9a3"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#43515a" flood-opacity=".22"/>
    </filter>
  </defs>

