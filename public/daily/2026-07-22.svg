<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Night security elevator round in a quiet hotel corridor</title>
  <desc id="desc">A documentary-style hotel night corridor shows a half-open elevator, guard torch, button panel, fire door, patrol map, low-volume radio, camera blind spot, quiet-hours sign, ice machine, light under a room door, and suitcase-wheel marks on the carpet.</desc>
  <defs>
    <linearGradient id="corridor" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#14202b"/>
      <stop offset="0.44" stop-color="#273946"/>
      <stop offset="1" stop-color="#6f6157"/>
    </linearGradient>
    <linearGradient id="carpet" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#2f2832"/>
      <stop offset="0.52" stop-color="#4c3d4c"/>
      <stop offset="1" stop-color="#76584d"/>
    </linearGradient>
    <linearGradient id="liftMetal" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#d7d0c3"/>
      <stop offset="0.56" stop-color="#78858a"/>
      <stop offset="1" stop-color="#2f3b43"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff5d8"/>
      <stop offset="1" stop-color="#cbbd96"/>
    </linearGradient>
    <linearGradient id="torchBeam" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#f8dd86" stop-opacity=".78"/>
      <stop offset="0.55" stop-color="#f8dd86" stop-opacity=".28"/>
      <stop offset="1" stop-color="#f8dd86" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#0b1118" flood-opacity=".34"/>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <rect width="960" height="540" rx="28" fill="url(#corridor)"/>
  <path d="M96 80h768M126 122h658M88 454h784" stroke="#f7ead0" stroke-width="8" stroke-linecap="round" opacity=".22"/>
  <path d="M90 374h778" stroke="#f9d07a" stroke-width="6" stroke-linecap="round" opacity=".16"/>
  <rect x="76" y="338" width="808" height="118" rx="28" fill="url(#carpet)"/>
  <path d="M122 382c118-24 236-24 354 2 126 28 250 20 362-26" fill="none" stroke="#9d7c74" stroke-width="8" stroke-linecap="round" opacity=".42"/>
  <path d="M172 420c48-14 104-14 168 0M578 404c62 18 122 16 178-4" fill="none" stroke="#211d25" stroke-width="7" stroke-linecap="round" stroke-dasharray="18 18" opacity=".45"/>

  <g transform="translate(94 104)" filter="url(#shadow)">
    <rect width="214" height="286" rx="30" fill="#1d2b36"/>
    <rect x="24" y="28" width="166" height="218" rx="22" fill="#263945"/>
    <path d="M42 66h114M42 110h114M42 154h114M42 198h114" stroke="#526b72" stroke-width="7" stroke-linecap="round" opacity=".5"/>
    <path d="M66 74h72M66 132h48M66 188h76" stroke="#f7ead0" stroke-width="9" stroke-linecap="round" opacity=".72"/>
    <rect x="164" y="74" width="64" height="104" rx="18" fill="#19252e"/>
    <path d="M184 108h24M184 140h24" stroke="#f8dd86" stroke-width="7" stroke-linecap="round"/>
    <circle cx="196" cy="84" r="8" fill="#e05f56"/>
    <text x="32" y="284" fill="#d7c8ad" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">lift arrives quietly</text>
  </g>

  <g transform="translate(324 88)" filter="url(#shadow)">
    <rect width="176" height="318" rx="26" fill="url(#liftMetal)"/>
    <rect x="18" y="22" width="140" height="274" rx="18" fill="#18252e"/>
    <path d="M88 22v274" stroke="#73828a" stroke-width="7" opacity=".72"/>
    <path d="M32 72h42M104 72h24M32 122h42M104 122h24M32 172h42M104 172h24" stroke="#d7d0c3" stroke-width="8" stroke-linecap="round" opacity=".55"/>
    <rect x="58" y="212" width="62" height="44" rx="15" fill="#f8dd86"/>
    <path d="M74 234h30" stroke="#293842" stroke-width="8" stroke-linecap="round"/>
    <text x="24" y="356" fill="#ddd0b6" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">button panel checked</text>
  </g>

  <g transform="translate(562 112)" filter="url(#shadow)">
    <rect width="152" height="264" rx="24" fill="#25333a"/>
    <path d="M36 32h80M36 70h80M36 108h80M36 146h80" stroke="#9cb0ad" stroke-width="8" stroke-linecap="round" opacity=".56"/>
    <path d="M40 198h72" stroke="#e05f56" stroke-width="12" stroke-linecap="round"/>
    <path d="M112 88v70" stroke="#f7ead0" stroke-width="8" stroke-linecap="round"/>
    <circle cx="112" cy="176" r="10" fill="#f8dd86"/>
    <text x="-8" y="302" fill="#d7c8ad" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">fire door still closes</text>
  </g>

  <g transform="translate(716 92)" filter="url(#shadow)">
    <rect width="126" height="196" rx="24" fill="#324550"/>
    <rect x="28" y="26" width="70" height="40" rx="16" fill="#f7ead0"/>
    <path d="M42 46h42" stroke="#324550" stroke-width="8" stroke-linecap="round"/>
    <path d="M64 72v88" stroke="#f8dd86" stroke-width="8" stroke-linecap="round"/>
    <path d="M34 126h60" stroke="#f8dd86" stroke-width="8" stroke-linecap="round"/>
    <circle cx="64" cy="162" r="18" fill="#e05f56"/>
    <text x="-8" y="234" fill="#d7c8ad" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">quiet hours sign</text>
  </g>

  <g transform="translate(660 314)" filter="url(#shadow)">
    <rect width="146" height="94" rx="24" fill="#d7d0c3"/>
    <rect x="22" y="20" width="102" height="50" rx="16" fill="#273946"/>
    <path d="M42 44h58M42 60h36" stroke="#a9c7c9" stroke-width="7" stroke-linecap="round"/>
    <path d="M122 64c20 16 30 32 30 52" fill="none" stroke="#f8dd86" stroke-width="8" stroke-linecap="round"/>
    <text x="10" y="132" fill="#dccfb5" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">ice machine coughs once</text>
  </g>

  <g transform="translate(486 62) rotate(3)" filter="url(#shadow)">
    <rect width="142" height="100" rx="22" fill="url(#paper)"/>
    <path d="M24 30h62M24 54h90M24 78h48" stroke="#5b625c" stroke-width="7" stroke-linecap="round"/>
    <path d="M98 28l24 18-30 8" fill="none" stroke="#e05f56" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="4" y="138" fill="#d7c8ad" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">floor patrol map</text>
  </g>

  <g transform="translate(210 314)" filter="url(#shadow)">
    <rect width="154" height="84" rx="24" fill="#1a2730"/>
    <path d="M30 42h76" stroke="#e5d9c0" stroke-width="10" stroke-linecap="round"/>
    <circle cx="116" cy="42" r="13" fill="#e05f56"/>
    <path d="M24 66h108" stroke="#657a7d" stroke-width="7" stroke-linecap="round"/>
    <text x="8" y="122" fill="#d7c8ad" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">radio stays low</text>
  </g>

  <g opacity=".82">
    <path d="M324 230 560 178 560 242 324 282z" fill="url(#torchBeam)"/>
    <path d="M556 182c48-42 112-52 192-30" fill="none" stroke="#f8dd86" stroke-width="8" stroke-linecap="round" stroke-dasharray="14 16" opacity=".52"/>
    <circle cx="756" cy="148" r="14" fill="#f8dd86" opacity=".8" filter="url(#softGlow)"/>
  </g>

  <g transform="translate(806 308)" filter="url(#shadow)">
    <rect width="44" height="100" rx="16" fill="#24323c"/>
    <path d="M0 100h154" stroke="#1a232a" stroke-width="12" stroke-linecap="round"/>
    <path d="M36 80h92" stroke="#f8dd86" stroke-width="6" stroke-linecap="round" opacity=".84"/>
    <text x="-18" y="140" fill="#d7c8ad" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">thin light under door</text>
  </g>

  <g transform="translate(116 392)">
    <path d="M0 0c42-16 90-14 144 6M438-8c64 20 130 18 198-4" fill="none" stroke="#1b1720" stroke-width="6" stroke-linecap="round" stroke-dasharray="10 16" opacity=".58"/>
    <circle cx="24" cy="-2" r="5" fill="#17131a" opacity=".52"/>
    <circle cx="78" cy="4" r="5" fill="#17131a" opacity=".52"/>
    <circle cx="472" cy="-2" r="5" fill="#17131a" opacity=".52"/>
    <circle cx="548" cy="-8" r="5" fill="#17131a" opacity=".52"/>
  </g>
</svg>
