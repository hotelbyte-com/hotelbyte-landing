<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Hotel arrival detour before the guest arrives</title>
  <desc id="desc">An angled hotel block shows construction cones, a blocked side entrance, temporary taxi drop-off, walking arrows, luggage cart, phone map, accessible ramp, and the hotel entrance.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#dfeef0"/>
      <stop offset="0.55" stop-color="#f2ead8"/>
      <stop offset="1" stop-color="#d0d9c9"/>
    </linearGradient>
    <linearGradient id="street" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#596970"/>
      <stop offset="1" stop-color="#2e3b42"/>
    </linearGradient>
    <linearGradient id="hotel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8f3e4"/>
      <stop offset="1" stop-color="#cbb88f"/>
    </linearGradient>
    <linearGradient id="phone" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#263b49"/>
      <stop offset="1" stop-color="#111f29"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#2d3a3e" flood-opacity=".24"/>
    </filter>
  </defs>

  <rect width="960" height="540" rx="28" fill="url(#sky)"/>
  <path d="M76 84h806M112 122h712M96 446h760" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity=".5"/>
  <path d="M70 330c128-34 254-36 378-4 118 30 254 24 414-20" fill="none" stroke="#ffffff" stroke-width="9" stroke-linecap="round" opacity=".36"/>

  <g transform="translate(86 134)" filter="url(#shadow)">
    <path d="M0 162 474 42l324 118-474 120z" fill="url(#street)"/>
    <path d="M48 166 474 62l276 98-424 104z" fill="#6e7d80" opacity=".44"/>
    <path d="M112 176c120-42 246-72 376-90M382 250c82-42 178-72 288-90" stroke="#f5df9f" stroke-width="8" stroke-linecap="round" stroke-dasharray="20 22" opacity=".88"/>
    <path d="M520 64 756 150" stroke="#f5f1e5" stroke-width="7" stroke-linecap="round" opacity=".5"/>
  </g>

  <g transform="translate(444 82)" filter="url(#shadow)">
    <path d="M0 52 218 0l172 66-220 58z" fill="#d9c9a6"/>
    <path d="M0 52v178l170 76V124z" fill="#c9b58c"/>
    <path d="M170 124 390 66v176l-220 64z" fill="url(#hotel)"/>
    <path d="M36 94h82M36 130h82M36 166h82" stroke="#f6ead1" stroke-width="10" stroke-linecap="round"/>
    <path d="M214 126h58M214 164h58M214 202h58M306 104h42M306 142h42M306 180h42" stroke="#8aa6a1" stroke-width="10" stroke-linecap="round"/>
    <rect x="236" y="224" width="78" height="74" rx="16" fill="#2f4b55"/>
    <path d="M254 254h42M254 276h28" stroke="#f7e6b8" stroke-width="7" stroke-linecap="round"/>
    <text x="220" y="336" fill="#53615a" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">main entrance</text>
  </g>

  <g transform="translate(176 204)" filter="url(#shadow)">
    <path d="M0 18h184v88H0z" fill="#e9d9b8"/>
    <path d="M0 18 40 0h184l-40 18z" fill="#f2e6c8"/>
    <path d="M184 18l40-18v88l-40 18z" fill="#b99f78"/>
    <path d="M28 40h112M28 70h80" stroke="#856f52" stroke-width="8" stroke-linecap="round"/>
    <circle cx="154" cy="42" r="11" fill="#e85d42"/>
    <text x="18" y="142" fill="#eef4ed" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">side entrance closed</text>
  </g>

  <g transform="translate(132 342)" filter="url(#shadow)">
    <rect width="174" height="74" rx="22" fill="#f7ead1"/>
    <path d="M28 28h76M28 52h112" stroke="#675d4b" stroke-width="8" stroke-linecap="round"/>
    <path d="M128 22l26 24-36 5" fill="none" stroke="#e85d42" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="8" y="112" fill="#425056" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">temporary drop-off</text>
  </g>

  <g transform="translate(330 316)" filter="url(#shadow)">
    <rect x="0" y="26" width="126" height="56" rx="18" fill="#f0c85f"/>
    <path d="M22 26c8-26 62-26 72 0" fill="none" stroke="#2d4853" stroke-width="12" stroke-linecap="round"/>
    <circle cx="34" cy="92" r="14" fill="#26363d"/>
    <circle cx="100" cy="92" r="14" fill="#26363d"/>
    <path d="M26 56h56" stroke="#805b28" stroke-width="7" stroke-linecap="round"/>
    <text x="-4" y="130" fill="#425056" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">taxi loop</text>
  </g>

  <g transform="translate(628 310)" filter="url(#shadow)">
    <rect x="22" y="36" width="126" height="76" rx="20" fill="#314c58"/>
    <path d="M42 36V16h76v20" fill="none" stroke="#f0c85f" stroke-width="10" stroke-linecap="round"/>
    <circle cx="48" cy="126" r="14" fill="#1b2930"/>
    <circle cx="126" cy="126" r="14" fill="#1b2930"/>
    <path d="M54 68h52M54 90h72" stroke="#e8f2ee" stroke-width="8" stroke-linecap="round"/>
    <rect x="0" y="0" width="70" height="48" rx="14" fill="#f7ead1"/>
    <path d="M16 18h28M16 32h40" stroke="#655946" stroke-width="6" stroke-linecap="round"/>
    <text x="-2" y="166" fill="#425056" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">luggage cart route</text>
  </g>

  <g transform="translate(754 214)" filter="url(#shadow)">
    <path d="M0 78c34-48 98-58 148-18v58H0z" fill="#8fb6aa"/>
    <path d="M20 82c28-24 68-30 108-14" fill="none" stroke="#eef7ef" stroke-width="10" stroke-linecap="round"/>
    <path d="M32 104h84" stroke="#44645f" stroke-width="7" stroke-linecap="round"/>
    <text x="-10" y="156" fill="#43535a" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">accessible ramp</text>
  </g>

  <g transform="translate(94 108)" filter="url(#shadow)">
    <rect width="156" height="230" rx="28" fill="url(#phone)"/>
    <rect x="18" y="24" width="120" height="178" rx="18" fill="#e8f3ed"/>
    <path d="M38 64c28-22 58-22 88 0M38 104h72M38 142c34-28 62-34 86-18" stroke="#5f7f78" stroke-width="8" stroke-linecap="round"/>
    <path d="M46 156l36-26 40 18" fill="none" stroke="#e85d42" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="112" cy="82" r="10" fill="#f0c85f"/>
    <circle cx="78" cy="212" r="8" fill="#f7ead1"/>
    <text x="10" y="268" fill="#425056" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">updated map note</text>
  </g>

  <g fill="#ef6a3c" stroke="#fff0cf" stroke-width="6" stroke-linejoin="round" filter="url(#shadow)">
    <path d="M382 226l20 70h-62z"/>
    <path d="M452 204l20 70h-62z"/>
    <path d="M520 190l20 70h-62z"/>
    <path d="M590 174l20 70h-62z"/>
    <path d="M660 162l20 70h-62z"/>
  </g>

  <path d="M306 374c54-52 120-84 198-96M474 300c68-14 124-34 168-62M676 312c38-20 74-42 108-68" fill="none" stroke="#f0c85f" stroke-width="9" stroke-linecap="round" stroke-dasharray="13 17" opacity=".9"/>
  <path d="M784 244l34 10-25 26" fill="none" stroke="#f0c85f" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M290 184c42 24 78 30 112 18" fill="none" stroke="#ef6a3c" stroke-width="8" stroke-linecap="round" opacity=".84"/>

  <text x="78" y="66" fill="#42565c" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">detour before arrival</text>
  <text x="78" y="100" fill="#667873" font-family="Inter, Arial, sans-serif" font-size="16">address, cones, drop-off, ramp, driver note, walking path</text>
</svg>
