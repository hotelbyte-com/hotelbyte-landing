  </g>

  <g transform="translate(454 354)" filter="url(#shadow)">
    <rect width="132" height="96" rx="22" fill="#eaf6f1"/>
    <path d="M28 0v96M72 0v96M18 26h96M18 58h96" stroke="#85aaa1" stroke-width="8" stroke-linecap="round"/>
    <rect x="28" y="18" width="30" height="58" rx="12" fill="url(#water)"/>
    <rect x="74" y="18" width="30" height="58" rx="12" fill="url(#water)"/>
    <text x="-4" y="132" fill="#526862" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">restock crate</text>
