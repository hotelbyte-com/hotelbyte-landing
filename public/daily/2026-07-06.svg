<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Hotel front desk water during extreme heat</title>
  <desc id="desc">A sunlit hotel front desk during extreme heat shows cold water bottles, a shaded drop-off note, thermometer, child cap, suitcase, restock crate, bench, recycling basket, and taxi outside.</desc>
  <defs>
    <linearGradient id="heatLobby" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff2c8"/>
      <stop offset="0.46" stop-color="#f4d08b"/>
      <stop offset="1" stop-color="#cde1d8"/>
    </linearGradient>
    <linearGradient id="desk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8ead1"/>
      <stop offset="1" stop-color="#9c7653"/>
    </linearGradient>
    <linearGradient id="glassDoor" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d8f3f0" stop-opacity=".8"/>
      <stop offset="1" stop-color="#6aa5a8" stop-opacity=".54"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e9fbff"/>
      <stop offset="0.58" stop-color="#6fc6d3"/>
      <stop offset="1" stop-color="#297f96"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#5f553f" flood-opacity=".22"/>
    </filter>
  </defs>

  <rect width="960" height="540" rx="28" fill="url(#heatLobby)"/>
  <circle cx="790" cy="82" r="64" fill="#f27c4b" opacity=".88"/>
  <path d="M690 84h202M736 34l110 96M736 130l110-96" stroke="#ffe6a8" stroke-width="10" stroke-linecap="round" opacity=".55"/>
  <path d="M78 92h804M104 132h722M96 454h760" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity=".48"/>
  <rect x="82" y="344" width="796" height="118" rx="30" fill="#b68458" opacity=".36"/>
  <path d="M116 390h706M154 432h626" stroke="#fff0bf" stroke-width="7" stroke-linecap="round" opacity=".42"/>

  <g transform="translate(578 104)" filter="url(#shadow)">
    <rect x="0" y="0" width="230" height="238" rx="28" fill="url(#glassDoor)"/>
    <path d="M30 34h170M30 76h170M30 118h170M30 160h170" stroke="#e9fbff" stroke-width="8" stroke-linecap="round" opacity=".55"/>
    <path d="M116 22v194" stroke="#4b777a" stroke-width="9" stroke-linecap="round" opacity=".72"/>
    <rect x="46" y="160" width="118" height="32" rx="16" fill="#ffe6a8"/>
