  <path d="M416 236c54-22 112-24 174-6M588 254c38 26 76 40 116 42M420 402c26-18 58-28 96-30M256 362c42-20 78-48 108-84" fill="none" stroke="#ffffff" stroke-width="9" stroke-linecap="round" stroke-dasharray="13 17" opacity=".78"/>
  <path d="M704 296l32 16-30 20" fill="none" stroke="#ffffff" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" opacity=".78"/>

  <text x="78" y="66" fill="#625238" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">water before paperwork</text>
  <text x="78" y="100" fill="#7a6a4d" font-family="Inter, Arial, sans-serif" font-size="16">heat, shade, bench, luggage, family, first minute</text>
