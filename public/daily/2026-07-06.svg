    <circle cx="94" cy="126" r="10" fill="#e86243"/>
    <text x="4" y="216" fill="#6e5b3e" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">39 C outside</text>
  </g>

  <g transform="translate(686 352)" filter="url(#shadow)">
