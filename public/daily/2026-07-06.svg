    <text x="-2" y="108" fill="#536865" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">family sits here</text>
  </g>

  <g transform="translate(202 302)" filter="url(#shadow)">
    <path d="M0 44c18-40 92-50 132-12l-16 34H12z" fill="#e86243"/>
    <path d="M48 30c28-16 56-14 82 6" fill="none" stroke="#ffd9a8" stroke-width="8" stroke-linecap="round"/>
    <path d="M118 66c28 2 50 10 68 24" fill="none" stroke="#e86243" stroke-width="12" stroke-linecap="round"/>
    <text x="8" y="110" fill="#714a35" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">child cap</text>
  </g>

  <g transform="translate(784 228)" filter="url(#shadow)">
    <rect width="74" height="98" rx="20" fill="#f7fff6"/>
    <path d="M22 28h30M18 48h38M22 68h30" stroke="#4f6a64" stroke-width="7" stroke-linecap="round"/>
    <path d="M20 88h36" stroke="#6fc6d3" stroke-width="8" stroke-linecap="round"/>
    <text x="-10" y="134" fill="#546661" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">recycling</text>
