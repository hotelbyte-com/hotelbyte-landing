<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Self-check-in code at a quiet night entrance</title>
  <desc id="desc">A late guest checks a phone with a self-check-in code beside a glowing keypad, entrance guidance, luggage, and warm lobby light.</desc>
  <defs>
