  <path d="M742 306l32 14-28 24" fill="none" stroke="#f4c76b" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="82" y="64" fill="#eef8f9" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">rain plan at the door</text>
  <text x="82" y="98" fill="#cce2e8" font-family="Inter, Arial, sans-serif" font-size="16">umbrella, sleeve, mat, taxi, return, mop</text>
