<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Rainy hotel lobby umbrella rack</title>
  <desc id="desc">A rainy hotel lobby shows an umbrella rack, wet entrance mat, umbrella sleeves, return basket, taxi-wait note, mop bucket, caution cone, and a traveler with luggage.</desc>
  <defs>
    <linearGradient id="rainGlass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#20354a"/>
      <stop offset="0.55" stop-color="#3f6072"/>
      <stop offset="1" stop-color="#8cb3bd"/>
    </linearGradient>
    <linearGradient id="lobbyFloor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8edf1"/>
      <stop offset="1" stop-color="#a9b7bd"/>
    </linearGradient>
    <linearGradient id="brass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4c76b"/>
      <stop offset="1" stop-color="#a96c37"/>
    </linearGradient>
    <linearGradient id="mat" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#263845"/>
      <stop offset="1" stop-color="#17242d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#142635" flood-opacity=".22"/>
    </filter>
  </defs>

