  <path d="M94 360c170-24 312-22 426 8 104 28 214 24 338-12" fill="none" stroke="#f6fbff" stroke-width="8" stroke-linecap="round" opacity=".28"/>
  <rect x="76" y="348" width="808" height="120" rx="26" fill="url(#lobbyFloor)"/>
  <path d="M110 414h740M136 446h676" stroke="#ffffff" stroke-width="7" stroke-linecap="round" opacity=".45"/>

