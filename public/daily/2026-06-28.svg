  </g>

  <g transform="translate(98 364)" filter="url(#softShadow)">
    <rect width="180" height="94" rx="22" fill="#e3f5ee"/>
    <path d="M28 34h76M28 62h116" stroke="#4f665d" stroke-width="8" stroke-linecap="round"/>
    <circle cx="136" cy="34" r="11" fill="#d15f4f"/>
    <text x="12" y="130" fill="#e3f5ee" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">support note</text>
  </g>

  <g transform="translate(720 398)" filter="url(#softShadow)">
    <rect width="132" height="72" rx="20" fill="#25312f"/>
    <rect x="18" y="14" width="32" height="18" rx="7" fill="#dbe7e2"/>
    <rect x="62" y="14" width="32" height="18" rx="7" fill="#dbe7e2"/>
    <rect x="18" y="42" width="32" height="18" rx="7" fill="#dbe7e2"/>
    <rect x="62" y="42" width="52" height="18" rx="7" fill="#e4b95c"/>
  </g>

  <g transform="translate(188 272)" filter="url(#softShadow)">
    <circle cx="40" cy="40" r="34" fill="#e5bd62"/>
    <circle cx="40" cy="40" r="18" fill="#fff2c6"/>
    <circle cx="96" cy="54" r="30" fill="#7fc1b0"/>
    <circle cx="96" cy="54" r="14" fill="#e8fff8"/>
    <circle cx="136" cy="24" r="24" fill="#d15f4f"/>
    <circle cx="136" cy="24" r="10" fill="#ffe5d9"/>
  </g>

  <g transform="translate(580 322)" filter="url(#softShadow)">
    <circle cx="48" cy="48" r="44" fill="#2f2725"/>
    <circle cx="48" cy="48" r="30" fill="#7b4a34"/>
    <path d="M80 42c36 0 36 38 0 38" fill="none" stroke="#f0dec7" stroke-width="10" stroke-linecap="round"/>
  </g>

  <path d="M244 214C320 204 354 192 408 184" fill="none" stroke="#f0c866" stroke-width="7" stroke-linecap="round" stroke-dasharray="12 15"/>
  <path d="M660 168c-54 24-98 42-142 58" fill="none" stroke="#7fc1b0" stroke-width="7" stroke-linecap="round" stroke-dasharray="12 15"/>
  <path d="M664 332c-52-2-96-8-132-18" fill="none" stroke="#d15f4f" stroke-width="7" stroke-linecap="round" stroke-dasharray="12 15"/>
  <path d="M278 406c62-34 116-52 162-54" fill="none" stroke="#e9e7da" stroke-width="7" stroke-linecap="round" stroke-dasharray="12 15"/>

  <g transform="translate(416 24)">
    <rect width="130" height="46" rx="18" fill="#e8f1ed" opacity=".94"/>
    <path d="M24 18h48M24 30h82" stroke="#465950" stroke-width="7" stroke-linecap="round"/>
  </g>

  <text x="82" y="64" fill="#f4ead7" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">16:00</text>
  <text x="82" y="98" fill="#e5d8bd" font-family="Inter, Arial, sans-serif" font-size="16">refund, rule, evidence, next owner</text>
</svg>
