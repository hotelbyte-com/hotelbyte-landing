<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Hotel refund reconciliation desk</title>
  <desc id="desc">An overhead hotel finance desk shows a refund reconciliation sheet, receipts, supplier invoice, room folio, calculator, support note, currency chips, and coffee connected by colored evidence lines.</desc>
  <defs>
    <linearGradient id="desktop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#31453f"/>
      <stop offset="0.52" stop-color="#4f665d"/>
      <stop offset="1" stop-color="#d7aa6c"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff9eb"/>
      <stop offset="1" stop-color="#e7f0e7"/>
    </linearGradient>
    <linearGradient id="receipt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="1" stop-color="#d9e8ed"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#1d2b29" flood-opacity=".24"/>
    </filter>
  </defs>

  <rect width="960" height="540" rx="28" fill="url(#desktop)"/>
  <path d="M88 126c136-34 246-30 330 12M572 108c88-28 178-20 270 24M92 452c158 28 304 20 438-24" fill="none" stroke="#fff4d8" stroke-width="8" stroke-linecap="round" opacity=".18"/>
  <path d="M118 82h724M102 470h756" stroke="#1f302d" stroke-width="8" stroke-linecap="round" opacity=".22"/>

  <g transform="translate(292 72)" filter="url(#softShadow)">
    <rect width="376" height="396" rx="28" fill="url(#paper)"/>
    <rect x="34" y="34" width="176" height="28" rx="14" fill="#d15f4f"/>
    <path d="M34 92h298M34 136h298M34 180h298M34 224h298M34 268h298" stroke="#9aa9a0" stroke-width="5" stroke-linecap="round" opacity=".5"/>
    <path d="M158 82v218M256 82v218" stroke="#9aa9a0" stroke-width="5" stroke-linecap="round" opacity=".42"/>
    <path d="M56 110h68M56 154h74M56 198h58M56 242h92" stroke="#51635c" stroke-width="9" stroke-linecap="round"/>
    <path d="M182 110h42M182 154h64M182 198h50M182 242h54" stroke="#51635c" stroke-width="9" stroke-linecap="round" opacity=".82"/>
    <path d="M276 110h38M276 154h30M276 198h42M276 242h24" stroke="#51635c" stroke-width="9" stroke-linecap="round" opacity=".7"/>
    <rect x="214" y="304" width="120" height="52" rx="16" fill="#fff0d2" stroke="#e7b868" stroke-width="4"/>
    <path d="M238 322h38M238 342h70" stroke="#7b5a36" stroke-width="8" stroke-linecap="round"/>
    <circle cx="312" cy="324" r="11" fill="#d15f4f"/>
    <text x="34" y="386" fill="#465950" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">refund sheet</text>
  </g>

  <g transform="translate(96 98) rotate(-6)" filter="url(#softShadow)">
    <rect width="154" height="236" rx="20" fill="url(#receipt)"/>
    <path d="M24 38h82M24 68h104M24 98h72M24 150h96M24 182h62" stroke="#4f6470" stroke-width="8" stroke-linecap="round"/>
    <path d="M112 118l22 22-30 5" fill="none" stroke="#d15f4f" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="18" y="272" fill="#e8f1ed" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">POS receipt</text>
  </g>

  <g transform="translate(684 82) rotate(5)" filter="url(#softShadow)">
    <rect width="178" height="148" rx="22" fill="#efe3ff"/>
    <path d="M28 42h86M28 76h122M28 110h76" stroke="#675582" stroke-width="9" stroke-linecap="round"/>
    <circle cx="132" cy="42" r="12" fill="#6ab59f"/>
    <path d="M134 88l24 22-34 6" fill="none" stroke="#d15f4f" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="10" y="190" fill="#efe3ff" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">supplier invoice</text>
  </g>

  <g transform="translate(686 286) rotate(-4)" filter="url(#softShadow)">
