<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Tour group rooming list in a hotel lobby</title>
  <desc id="desc">A tour leader organizes a group arrival with a rooming list, passport folders, luggage tags, key cards, breakfast vouchers, elevator direction, meeting time, and colored suitcases.</desc>
  <defs>
    <linearGradient id="lobbyWall" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eaf4f0"/>
      <stop offset="0.48" stop-color="#d6e8df"/>
      <stop offset="1" stop-color="#f3c978"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d7b06f"/>
      <stop offset="1" stop-color="#8f6845"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff9e8"/>
      <stop offset="1" stop-color="#e7efe6"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#405052" flood-opacity=".22"/>
    </filter>
  </defs>

  <rect width="960" height="540" rx="28" fill="url(#lobbyWall)"/>
  <path d="M84 90h792M104 136h732" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity=".55"/>
  <rect x="74" y="344" width="812" height="118" rx="26" fill="url(#floor)"/>
  <path d="M104 392h752M142 432h676" stroke="#ffe3a7" stroke-width="7" stroke-linecap="round" opacity=".42"/>

