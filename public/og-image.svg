<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="HotelByte — AI-Native Engineering OS for Hotel Distribution">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f1a"/>
      <stop offset="50%" stop-color="#0a0f1a"/>
      <stop offset="100%" stop-color="#13182a"/>
    </linearGradient>
    <linearGradient id="text" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#b026ff"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.2" cy="0.2" r="0.8">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.85" cy="0.85" r="0.7">
      <stop offset="0%" stop-color="#b026ff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#b026ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="0.4"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Logo mark -->
  <g transform="translate(96, 96)">
    <rect width="72" height="72" rx="18" fill="url(#text)"/>
    <text x="36" y="49" font-family="ui-sans-serif, system-ui, -apple-system, 'Inter', sans-serif" font-weight="800" font-size="34" fill="#0a0f1a" text-anchor="middle" letter-spacing="-1">HB</text>
  </g>

  <!-- Brand wordmark -->
  <g transform="translate(96, 220)">
    <text font-family="ui-sans-serif, system-ui, -apple-system, 'Inter', sans-serif" font-weight="800" font-size="60" fill="#ffffff" letter-spacing="-1.5">HotelByte</text>
  </g>

  <!-- Headline -->
  <g transform="translate(96, 304)">
    <text font-family="ui-sans-serif, system-ui, -apple-system, 'Inter', sans-serif" font-weight="700" font-size="64" letter-spacing="-1.5">
      <tspan fill="#ffffff">AI-Native Engineering OS</tspan>
      <tspan x="0" dy="84" fill="url(#text)">for Hotel Distribution</tspan>
    </text>
  </g>

  <!-- Subline -->
  <g transform="translate(96, 522)">
    <text font-family="ui-sans-serif, system-ui, -apple-system, 'Inter', sans-serif" font-weight="500" font-size="26" fill="#a0a8b8" letter-spacing="0">
      27+ supplier integrations · Price intelligence · Full-linkage diagnostics · AI revenue strategy
    </text>
  </g>

  <!-- Domain pill -->
  <g transform="translate(96, 580)">
    <rect width="280" height="34" rx="17" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="17" y="23" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-weight="600" font-size="16" fill="#00f0ff">hotelbyte.com</text>
  </g>

  <!-- Decorative grid -->
  <g opacity="0.18" stroke="#ffffff" stroke-opacity="0.5" stroke-width="0.5">
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="470" x2="1200" y2="470"/>
  </g>
  <g opacity="0.25" fill="#00f0ff">
    <circle cx="1100" cy="120" r="3"/>
    <circle cx="1080" cy="160" r="2"/>
    <circle cx="1120" cy="200" r="2"/>
    <circle cx="1090" cy="240" r="3"/>
    <circle cx="1140" cy="290" r="2"/>
  </g>
</svg>
